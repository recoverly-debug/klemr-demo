// ─────────────────────────────────────────────────────────────────────────────
// Brand: KlemrMark + Wordmark + Icons + HandNote
//
// The mark is an aperture (the agent's "lens" — watching every shipment),
// with three bracket notches at 4/8/12 o'clock representing the loop:
// collect evidence → audit invoice → reclaim. A sweep-arm crosses the dial
// (the agent's gaze + the diagonal of a stylized "K"); a filled dot at the
// tip is the moment of catching a discrepancy.
// ─────────────────────────────────────────────────────────────────────────────
function KlemrMark({ size = 36, color = C.amber, ink = false, animated = false }) {
  const stroke = ink ? 1.8 : 1.6;
  const filterId = `k-ink-${size}-${color.replace('#','')}`;
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ display: "block", overflow: "visible" }}>
      {ink && (
        <defs><filter id={filterId}><feGaussianBlur stdDeviation="0.18" /></filter></defs>
      )}
      <g filter={ink ? `url(#${filterId})` : undefined} opacity={ink ? 0.94 : 1}>
        {/* Outer aperture ring */}
        <circle cx="20" cy="20" r="17" fill="none" stroke={color} strokeWidth={stroke * 0.55} opacity="0.32" />
        <circle cx="20" cy="20" r="14" fill="none" stroke={color} strokeWidth={stroke} />

        {/* Three bracket notches — the loop: collect / audit / reclaim.
            Each is a short L-shape sitting just inside the inner ring. */}
        {[
          { a: -90, label: "collect" },   // 12 o'clock
          { a: 30,  label: "reclaim" },   // 4 o'clock
          { a: 150, label: "audit" },     // 8 o'clock
        ].map((n, i) => {
          const rad = (n.a * Math.PI) / 180;
          const r = 11.4;
          const cx = 20 + Math.cos(rad) * r;
          const cy = 20 + Math.sin(rad) * r;
          // tangent direction
          const tx = -Math.sin(rad), ty = Math.cos(rad);
          const nx = Math.cos(rad), ny = Math.sin(rad);
          const armLen = 2.4;
          return (
            <g key={i}>
              <line
                x1={cx - tx * armLen} y1={cy - ty * armLen}
                x2={cx} y2={cy}
                stroke={color} strokeWidth={stroke} strokeLinecap="round"
              />
              <line
                x1={cx} y1={cy}
                x2={cx + nx * armLen * 0.85} y2={cy + ny * armLen * 0.85}
                stroke={color} strokeWidth={stroke} strokeLinecap="round"
              />
            </g>
          );
        })}

        {/* Sweep-arm — the agent's gaze. This is also the diagonal stem of K.
            Starts near 10 o'clock on the inner ring, crosses through center
            and out toward 4 o'clock where the catch-dot sits. */}
        <line
          x1="11.5" y1="13.2" x2="26" y2="26"
          stroke={color} strokeWidth={stroke * 1.15} strokeLinecap="round"
          className={animated ? "k-sweep" : undefined}
          style={animated ? { transformOrigin: "20px 20px" } : undefined}
        />

        {/* Hub — the agent's pivot point */}
        <circle cx="20" cy="20" r={stroke * 0.9} fill={color} />

        {/* Catch-dot — moment of catching a discrepancy */}
        <circle cx="26" cy="26" r={stroke * 1.05} fill={color} />
        <circle cx="26" cy="26" r={stroke * 2.2} fill="none" stroke={color} strokeWidth={stroke * 0.4} opacity="0.5" />
      </g>
    </svg>
  );
}

const HandNote = memo(function HandNote({ children, color = C.amberInk, rotate = -2, size = 18, delay = 0, style }) {
  const computedStyle = useMemo(() => ({
    "--r": `${rotate}deg`,
    fontFamily: "'Caveat', cursive",
    color, fontSize: size, lineHeight: 1.15,
    animationDelay: `${delay}s`,
    display: "inline-block", whiteSpace: "nowrap",
    ...(style || {}),
  }), []);
  return <span className="k-hand k-hand-anim" style={computedStyle}>{children}</span>;
});

const MERCHANT = { name: "Verdant Botanicals", tier: "Skincare · DTC · $24M revenue" };

// Agent-feed copy. Voice rules:
//   • Plain, calm, professional. First-person verbs.
//   • Translate jargon ("DIM" → "dimensional weight", "MBG" → "money-back
//     guarantee"). A first-time reader should understand each entry in one read.
//   • Complete sentences with periods. No fragments, no exclamations, no emoji.
//   • 12–18 words on average, hard ceiling 24.
//   • `stage` is a LIFECYCLE.key — drives the dot color in the rail.

  { stage: "invoice", text: "A new fedex invoice just landed. I'm starting the audit." },
  { stage: "pickup",  text: "Sealed evidence on #VB-44218 — ups picked it up at the warehouse." },

  { stage: "transit", text: "Following weather along the route for #VB-44188. Light rain in louisville, but no service guarantee waivers triggered." },

// ─── LifecycleStrip — horizontal stage strip with shipment counts ───
// Used at the top of Overview. Compact: short label + count + connector line.
const LifecycleStrip = memo(function LifecycleStrip({ counts, activeKey, onPick }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(7, minmax(0, 1fr))`,
      background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12,
      padding: "14px 6px", gap: 0, position: "relative",
      minWidth: 0, overflow: "hidden",
    }}>
      {LIFECYCLE.map((s, i) => {
        const n = counts?.[s.key] ?? 0;
        const isActive = activeKey === s.key;
        const isLast = i === LIFECYCLE.length - 1;
        return (
          <div key={s.key} style={{ position: "relative", padding: "0 8px", display: "flex", flexDirection: "column", gap: 8, minWidth: 0 }}>
            {/* connector line to next stage */}
            {!isLast && (
              <div style={{
                position: "absolute", top: 12, right: 0, width: 16,
                height: 1, background: `linear-gradient(to right, ${s.color}55, ${LIFECYCLE[i+1].color}55)`,
                transform: "translateX(50%)", pointerEvents: "none", opacity: 0.4,
              }} />
            )}
            <button onClick={() => onPick && onPick(s.key)} style={{
              background: "transparent", border: "none", padding: 0, cursor: onPick ? "pointer" : "default",
              textAlign: "left", color: "inherit", display: "flex", flexDirection: "column", gap: 6,
              minWidth: 0,
            }}>
              <div className="flex items-center" style={{ gap: 6, minWidth: 0 }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 999,
                  background: isActive ? s.color : `${s.color}22`,
                  color: isActive ? C.bg : s.color,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 10, fontWeight: 700, fontFamily: "var(--font-mono)",
                  border: `1px solid ${s.color}55`, flexShrink: 0,
                }}>{s.id}</div>
                <span className="k-mono" style={{
                  fontSize: 9, color: isActive ? s.color : C.textMuted,
                  letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 700,
                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", minWidth: 0,

            </button>

      })}
    </div>
  );
});

// ─── LifecycleMini — horizontal compact strip showing one shipment's path ───
// Used in filing detail header. Shows where in the lifecycle the dispute sits.
const LifecycleMini = memo(function LifecycleMini({ activeKey, completedKeys = [] }) {
  const completed = new Set(completedKeys);
  return (
    <div className="flex items-center" style={{ gap: 0, flexWrap: "wrap" }}>
      {LIFECYCLE.map((s, i) => {
        const isActive = activeKey === s.key;
        const isDone = completed.has(s.key);
        const isPast = isDone || (LIFECYCLE.findIndex(x => x.key === activeKey) > i);
        const dotColor = isActive ? s.color : isPast ? `${s.color}aa` : C.borderBright;
        return (
          <React.Fragment key={s.key}>
            <div className="flex items-center" style={{ gap: 6, opacity: isActive || isPast ? 1 : 0.5 }}>
              <div style={{
                width: 14, height: 14, borderRadius: 999,
                background: isActive ? s.color : "transparent",
                border: `1.5px solid ${dotColor}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 8, fontWeight: 700, color: isActive ? C.bg : dotColor,
                fontFamily: "var(--font-mono)",
              }}>{isPast && !isActive ? "✓" : s.id}</div>
              <span className="k-mono" style={{
                fontSize: 9, color: isActive ? s.color : isPast ? C.textSec : C.textMuted,
                letterSpacing: "0.1em", textTransform: "uppercase",
                fontWeight: isActive ? 700 : 500,
              }}>{s.short}</span>
            </div>
            {i < LIFECYCLE.length - 1 && (
              <div style={{ width: 14, height: 1, background: C.borderBright, margin: "0 8px", opacity: 0.5 }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
});

// Typewriter — isolates its own re-renders so it doesn't restart sibling
// animations. Memoized; the DOM mutation it does is scoped to a span ref.
const Typewriter = memo(function Typewriter({ text, speed = 8, delay = 0, className, style, onDone }) {
  const ref = useRef(null);
  // Once the typewriter has fully revealed its text, latch "done" so any
  // upstream prop churn (e.g. a parent re-render that recomputes the same
  // string, or a value that changes mid-render) does NOT restart the
  // animation and blank the line. The line stays as the final rendered text.
  const doneRef = useRef(false);
  useEffect(() => {
    const node = ref.current;
    if (!node) return;
    if (doneRef.current) {
      // Already finished a previous run — keep the latest text on screen
      // without re-animating.
      node.textContent = text;
      return;
    }
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { node.textContent = text; doneRef.current = true; if (onDone) onDone(); return; }
    let i = 0;
    let timer = null;
    let cancelled = false;
    node.textContent = "";
    const tick = () => {
      if (cancelled) return;
      if (i >= text.length) { doneRef.current = true; if (onDone) onDone(); return; }
      i += 1;
      node.textContent = text.slice(0, i);
      timer = setTimeout(tick, speed);
    };
    const start = setTimeout(tick, delay);
    return () => { cancelled = true; clearTimeout(start); if (timer) clearTimeout(timer); };
  }, [text, speed, delay]);
  return <span ref={ref} className={className} style={style} />;
});

// RichTypewriter — character-by-character reveal of an HTML string. Supports
// inline tags (em, span, etc.) so styled fragments (#VB-44087, $1,832) appear
// in the same conversational rhythm as the surrounding prose.
//
// Pre-pass: walk the HTML once and build a "frame" array — each frame is the
// HTML to render at a given visible-character count. Tags are emitted between
// frames; text characters tick frames forward. Open tags are auto-closed at
// the cut point so partial frames are valid HTML.
function buildHtmlFrames(html) {
  const frames = [""];
  const stack = [];   // open tag names, outermost-first
  let cur = "";       // running HTML so far
  let i = 0;
  while (i < html.length) {
    const ch = html[i];
    if (ch === "<") {
      const close = html.indexOf(">", i);
      if (close === -1) break;
      const tagSrc = html.slice(i, close + 1);
      cur += tagSrc;
      const isClose = tagSrc[1] === "/";
      const isSelf = tagSrc.endsWith("/>");
      if (!isClose && !isSelf) {
        const m = tagSrc.match(/^<\s*([a-zA-Z0-9]+)/);
        if (m) stack.push(m[1]);
      } else if (isClose) {
        stack.pop();
      }
      i = close + 1;
    } else {
      cur += ch;
      // Push a frame with all open tags closed for safe partial render
      const closes = stack.slice().reverse().map(n => `</${n}>`).join("");
      frames.push(cur + closes);
      i += 1;
    }
  }
  return frames;
}

    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { node.innerHTML = html; doneRef.current = true; if (onDone) onDone(); return; }
    let i = 0;
    let timer = null;
    let cancelled = false;
    node.innerHTML = "";
    const tick = () => {
      if (cancelled) return;
      if (i >= frames.length - 1) { node.innerHTML = html; doneRef.current = true; if (onDone) onDone(); return; }
      i += 1;
      node.innerHTML = frames[i];
      timer = setTimeout(tick, speed);
    };
    const start = setTimeout(tick, delay);
    return () => { cancelled = true; clearTimeout(start); if (timer) clearTimeout(timer); };
  }, [html, frames, speed, delay]);
  return <span ref={ref} className={className} style={style} />;
});

// Single-input coordination context. Only one text input across the whole
// transcript may hold the user's keystrokes at a time: the bottom composer,
// or one inline "something else…" field on a card. When a new input takes
// focus, the previous one is asked to collapse back to its chip form (its
// draft is preserved on its own state so the user loses nothing if they
// re-open it).
//
// Shape: { activeId, request(id, collapseFn) }. A consumer that owns an
// input registers a collapse callback when it becomes active; the context
// invokes the previous active consumer's collapse before swapping ids.
const ActiveInputCtx = React.createContext({
  activeId: null,
  request: () => {},
  release: () => {},
});

// semantics fix: there is exactly ONE place to type in the entire UI — the
// bottom composer. Clicking the affordance fires `onCustom(contextLabel)`
// which the parent uses to focus the composer and hang a small reference
// chip above it (e.g. `re: #VB-44087 ×`). The card stays pinned in the

// Undo button for resolved cards — fades in only after the resolved
// line finishes typing, so it doesn't crowd the conversational reveal.
function ResolvedUndo({ onClick, revealAfterMs }) {
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setShown(true); return; }
    const t = setTimeout(() => setShown(true), revealAfterMs);
    return () => clearTimeout(t);
  }, [revealAfterMs]);
  if (!shown) return null;
  return (
    <button onClick={onClick} className="k-fade-in" style={{
      background: "transparent", border: "none", color: C.textMuted,
      fontSize: 12, cursor: "pointer", padding: "2px 4px",
      fontFamily: "'Geist', system-ui, sans-serif", textDecoration: "underline",
      textDecorationColor: C.border,
    }}>undo</button>
  );
}

// Generic delayed-reveal wrapper — renders nothing until `ms` has elapsed,
// then fades its children in. Used to hold action chips back until the
// preceding agent message has finished typing, so the chips don't appear
// mid-sentence.
function DelayedReveal({ ms, children }) {
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setShown(true); return; }
    const t = setTimeout(() => setShown(true), ms);
    return () => clearTimeout(t);
  }, [ms]);
  if (!shown) return null;
  return <div className="k-fade-in">{children}</div>;
}

// Card-as-message — agent message: headline + body + italic lean + inline
// actions. The accent line (when current) is owned by the parent AgentLine
// wrapper, so the card's own chrome stays minimal.
// When `typed` is true, the headline → body → lean → actions reveal
// character-by-character so the card lands as part of the conversation
// rather than as an action panel. headlineHtml / bodyHtml are HTML strings
// (so styled fragments like <em>#VB-44087</em> or <span color=amber>$1,832</span>
// can ride along with the typing rhythm). When `typed` is false, the
// component falls back to rendering `headline` / `body` JSX directly.
function CardMessage({
  headline, body, lean, chips, resolved, onPick, isCurrent,
  typed = false, startDelay = 0, headlineHtml, bodyHtml, speed = 8, onTyped,
  nested = false, cardKey, contextLabel, superseded = false, onCustom,
}) {
  // Compute per-segment delays. Each segment runs after the previous finishes.
  const headlineLen = headlineHtml ? headlineHtml.replace(/<[^>]+>/g, "").length : 0;
  const bodyLen     = bodyHtml     ? bodyHtml.replace(/<[^>]+>/g, "").length     : 0;
  const leanLen     = lean         ? lean.length                                  : 0;
  const headlineDelay = startDelay;
  const bodyDelay     = headlineDelay + headlineLen * speed + 180;
  const leanDelay     = bodyDelay     + bodyLen     * speed + 200;
  const actionsDelay  = leanDelay     + leanLen     * speed + 220;
  const totalRevealMs = actionsDelay + 60;

  // Reveal actions only after typing is done. Keyed off mount + interval to
  // avoid React state churn during typing.
  const [revealed, setRevealed] = useState(!typed);
  useEffect(() => {
    if (!typed) { setRevealed(true); return; }
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setRevealed(true); return; }
    const t = setTimeout(() => setRevealed(true), totalRevealMs);
    return () => clearTimeout(t);
  }, [typed, totalRevealMs]);
  // Notify parent once the card finishes typing — used to gate contextual
  // prompt sets that should only appear after the question is fully posed.
  useEffect(() => {
    if (revealed && onTyped) onTyped();
  }, [revealed]);

  if (resolved) {
    const resolvedLen = resolved.line.length;
    // Keep the original question + body + lean visible (slightly muted)
    // so the user can revisit what was asked. The chip row collapses
    // into a single "you picked: X" line, and the agent's reply types
    // in below. Undo restores the chip row.
    const pickedChip = chips && chips.find(c => c.outcome && c.outcome.line === resolved.line);
    const pickedLabel = pickedChip ? pickedChip.label : null;
    return (
      <div className="k-fade-in" style={{
        paddingLeft: nested ? 0 : 14,
        borderLeft: nested ? "none" : (isCurrent ? `2px solid ${C.mint}` : `2px solid transparent`),
      }}>
        <div style={{
          fontFamily: "'Geist', system-ui, sans-serif", maxWidth: 580,
          opacity: 0.72,
        }}>
          <h3 style={{
            margin: "0 0 8px", fontSize: 16, lineHeight: 1.4, letterSpacing: 0,
            color: C.text, fontWeight: 600,
          }}>
            {headlineHtml
              ? <span dangerouslySetInnerHTML={{ __html: headlineHtml }} />
              : headline}
          </h3>
          <p style={{ margin: "0 0 10px", color: C.textSec, fontSize: 14.5, lineHeight: 1.55 }}>
            {bodyHtml
              ? <span dangerouslySetInnerHTML={{ __html: bodyHtml }} />
              : body}
          </p>
          {lean && (
            <p style={{
              margin: "0 0 4px", fontSize: 14, lineHeight: 1.5,
              color: C.text, fontStyle: "italic", fontWeight: 400,
            }}>
              {lean}
            </p>
          )}
        </div>
        {/* Picked-action row — shows the user's choice inline with the
            other (now-muted) options, so the decision is legible at a
            glance without losing the alternatives that were on offer. */}
        {pickedLabel && chips && (
          <div className="k-mono k-fade-in" style={{
            fontSize: 13, color: C.textMuted, marginTop: 10,
            display: "flex", flexWrap: "wrap", alignItems: "center", gap: 0,
            lineHeight: 1.6,
          }}>
            <span style={{ color: C.textMuted, marginRight: 8 }}>you picked</span>
            {chips.map((c, i) => {
              const isPicked = c.label === pickedLabel;
              return (
                <React.Fragment key={c.label}>
                  {i > 0 && <span style={{ color: C.textMuted, padding: "0 8px", opacity: 0.5 }}>·</span>}
                  <span style={{
                    color: isPicked ? C.text : C.textMuted,
                    opacity: isPicked ? 1 : 0.55,
                    fontWeight: isPicked ? 600 : 400,
                    textDecoration: isPicked && c.primary ? `underline 1px ${C.amber}` : "none",
                    textUnderlineOffset: 3,
                  }}>{c.label}</span>
                </React.Fragment>
              );
            })}
          </div>
        )}
        {/* Resolved reply + undo. */}
        <div style={{
          fontFamily: "'Geist', system-ui, sans-serif", fontSize: 14, lineHeight: 1.5,
          color: C.textSec, display: "flex", alignItems: "center",
          gap: 10, flexWrap: "wrap", marginTop: 14,
        }}>
          <span>
            <Typewriter text={resolved.line} speed={speed} delay={0} />
            {isCurrent && <span className="k-caret" style={{ color: C.textSec, marginLeft: 2 }}>▍</span>}
          </span>
          <ResolvedUndo
            onClick={() => onPick(null)}
            revealAfterMs={resolvedLen * speed + 120}
          />
        </div>
      </div>
    );
  }
  return (
    <div className="k-fade-in" style={{
      paddingLeft: nested ? 0 : 14,
      borderLeft: nested ? "none" : (isCurrent ? `2px solid ${C.mint}` : `2px solid transparent`),
    }}>
      <div style={{ fontFamily: "'Geist', system-ui, sans-serif", maxWidth: 580 }}>
        <h3 style={{
          margin: "0 0 8px", fontSize: 16, lineHeight: 1.4, letterSpacing: 0,
          color: C.text, fontWeight: 600,
        }}>
          {typed && headlineHtml
            ? <RichTypewriter html={headlineHtml} speed={speed} delay={headlineDelay} />
            : headline}
        </h3>
        <p style={{ margin: "0 0 10px", color: C.textSec, fontSize: 14.5, lineHeight: 1.55 }}>
          {typed && bodyHtml
            ? <RichTypewriter html={bodyHtml} speed={speed} delay={bodyDelay} />
            : body}
        </p>
        {lean && (
          <p style={{
            margin: "0 0 4px", fontSize: 14, lineHeight: 1.5,
            color: C.text, fontStyle: "italic", fontWeight: 400,
          }}>
            {typed
              ? <Typewriter text={lean} speed={speed} delay={leanDelay} />
              : lean}
          </p>
        )}
        {revealed && (
          <div className="k-fade-in">
            <InlineActions chips={chips} onPick={onPick} cardKey={cardKey} contextLabel={contextLabel} onCustom={onCustom} superseded={superseded} />
          </div>
        )}
        {isCurrent && revealed && <span className="k-caret" style={{ color: C.textSec, marginLeft: 2, fontSize: 13 }}>▍</span>}
      </div>
    </div>
  );
}

  const [c1Done, setC1Done] = useState(false);
  const [c2Done, setC2Done] = useState(false);
  // "card has finished typing its question" gates — turn true once the
  // CardMessage has fully revealed (headline + body + lean + actions).
  // Used to time the contextual prompt sets so they only appear after the
  // question is fully posed.
  const [card1Typed, setCard1Typed] = useState(false);
  const [card2Typed, setCard2Typed] = useState(false);
  // Conversational stagger after both cards resolve.
  const [settledLineDone, setSettledLineDone] = useState(false);
  const [recoveredLineDone, setRecoveredLineDone] = useState(false);
  // Resolved-line typing speed (matches CardMessage default).
  const RESOLVED_SPEED = 8;
  const RESOLVED_GAP = 320;
  // Free-form thread items the user appended via the chat surface or by tapping
  // a quick-action. Each item is { id, kind: "user"|"agent", text, thinking? }.
  const [thread, setThread] = useState([]);
  const [showLedger, setShowLedger] = useState(false);

  // ─── Auto-scroll the transcript so new messages stay visible.
  // Behavior mirrors Claude / ChatGPT: if the user is near the bottom of
  // the scroll viewport, we keep them pinned to the bottom as content
  // grows (typewriter animations, new turns appended). If the user has
  // deliberately scrolled up to read, we leave their position alone and
  // don't yank them back.
  const scrollRef = useRef(null);
  const stickToBottomRef = useRef(true);
  // Track whether the user has scrolled up. We update on every scroll;
  // "near bottom" = within 120px of the bottom edge.
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const onScroll = () => {
      const distanceFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
      stickToBottomRef.current = distanceFromBottom < 120;
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => el.removeEventListener("scroll", onScroll);
  }, []);
  // Continuous pin-to-bottom while typing/animation is happening. We use
  // a ResizeObserver on the inner content so we follow the height as it
  // grows, not just on React renders. A MutationObserver picks up newly
  // appended children (e.g. thread turns) and attaches the RO to them.
  // rAF debounce keeps it cheap.
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    let raf = 0;
    const stick = () => {
      if (stickToBottomRef.current) {
        el.scrollTop = el.scrollHeight;
      }
    };
    const queueStick = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(stick);
    };
    const ro = new ResizeObserver(queueStick);
    // Observe every existing child + the container itself so we react
    // to any descendant height change (cards, thread items, typewriters).
    const observeAll = () => {
      Array.from(el.children).forEach(child => ro.observe(child));
    };
    observeAll();
    // Watch for new children (thread items, follow-up cards) and attach
    // the RO to them as they arrive.
    const mo = new MutationObserver((muts) => {
      muts.forEach(m => {
        m.addedNodes.forEach(node => {
          if (node.nodeType === 1) ro.observe(node);
        });
      });
      queueStick();
    });
    mo.observe(el, { childList: true, subtree: true });
    return () => { ro.disconnect(); mo.disconnect(); cancelAnimationFrame(raf); };
  }, []);
  // On thread length change (new turn appended), force-stick — a brand-new
  // message should always reveal even if the user happened to scroll up
  // earlier; matches Claude behavior on send.
  useEffect(() => {
    stickToBottomRef.current = true;
    const el = scrollRef.current;
    if (el) el.scrollTop = el.scrollHeight;
  }, [thread.length]);

  // ─── Active-input coordination. Only one input takes keystrokes at a
  // time across the transcript: the bottom composer, or a card's inline
  // "something else…" field. When a new input claims focus, the previous
  // owner is told to collapse (its draft is preserved on its own state).
  const [activeInputId, setActiveInputId] = useState(null);
  const requestActiveInput = useCallback((id) => {
    setActiveInputId(id);
  }, []);
  const releaseActiveInput = useCallback((id) => {
    setActiveInputId(prev => prev === id ? null : prev);
  }, []);
  const activeInputCtxValue = useMemo(() => ({
    activeId: activeInputId,
    request: requestActiveInput,
    release: releaseActiveInput,
  }), [activeInputId, requestActiveInput, releaseActiveInput]);

  // Composer reference + focus signal — lifted from "✎ something else…"
  // on a card. Setting these focuses the bottom composer and shows a
  // small `re: <label>` chip above it so the user knows what their next
  // message is replying to. The chip carries a `ref` (e.g. "card1") so
  // the submitted reply can be routed to resolve that card.
  const [composerRef, setComposerRef] = useState(null);
  const [composerFocusN, setComposerFocusN] = useState(0);
  const dismissComposerRef = useCallback(() => setComposerRef(null), []);
  const focusComposerForCard = useCallback((cardKey) => {
    const labelMap = {
      "card1": "#VB-44087",
      "card2": "the 11 ups reclassifications",
    };
    // If contextLabel was passed in directly, prefer it.
    let label = labelMap[cardKey] || cardKey;
    if (typeof cardKey === "string" && (cardKey.startsWith("#") || cardKey.includes(" "))) {
      label = cardKey;
    }
    // Map labels back to the underlying ref so submit can resolve cards.
    let ref = null;
    if (label === "#VB-44087" || cardKey === "card1") ref = "card1";
    else if (label === "the 11 ups reclassifications" || cardKey === "card2") ref = "card2";
    setComposerRef({ label, ref });
    setComposerFocusN(n => n + 1);
  }, []);

  const expanded = NEEDS_YOU[0];
  const collapsed = NEEDS_YOU[1];

  const c1Chips = [
    { label: "re-file with noaa", primary: true,  outcome: { tone: "won",   line: "noaa attachment sent. i'll log the response when it lands." } },
    { label: "call dispute line",                  outcome: { tone: "won",   line: "queued a dispute call for tomorrow morning." } },
    { label: "let it go",                          outcome: { tone: "muted", line: "letting it go. logged in the dossier." } },
  ];
  const c2Chips = [
    { label: "file the batch", primary: true, outcome: { tone: "won",   line: "batch sent. watching for the reply alongside the others." } },
    { label: "wait a week",                    outcome: { tone: "muted", line: "holding for a week. i'll re-surface if it grows." } },
    { label: "open first",                     outcome: { tone: "muted", line: "opened in patterns view. come back when you're ready." }, then: () => setView && setView("patterns") },
  ];

  // ─── Mid-stream protection (declared early so onAsk can use afterStream).
  const streamingRef = useRef(null);
  const streamingQueueRef = useRef([]);
  const drainStreamingQueue = useCallback(() => {
    const q = streamingQueueRef.current;
    streamingQueueRef.current = [];
    q.forEach(fn => { try { fn(); } catch (e) {} });
  }, []);
  const afterStream = useCallback((fn) => {
    if (!streamingRef.current) { fn(); return; }
    streamingQueueRef.current.push(fn);
  }, []);
  const markStreamingStart = useCallback((id) => {
    if (streamingRef.current && streamingRef.current !== id) drainStreamingQueue();
    streamingRef.current = id;
  }, [drainStreamingQueue]);
  const markStreamingDone = useCallback((id) => {
    if (streamingRef.current === id) streamingRef.current = null;
    drainStreamingQueue();
  }, [drainStreamingQueue]);

  // Track which thread agent item is currently streaming so chip clicks /
  // composer submits can wait for it to finish before landing.
  useEffect(() => {
    const last = [...thread].reverse().find(it => it.kind === "agent" && !it.thinking);
    if (last) markStreamingStart(last.id);
  }, [thread, markStreamingStart]);

  const onAsk = useCallback((text, refKey) => {
    const uid = `u-${Date.now()}`;
    const aid = `a-${Date.now()}`;
    // Always append the user turn immediately — the user's voice should
    // appear right away even if an agent message is mid-stream.
    setThread(t => [...t, { id: uid, kind: "user", text, replyTo: refKey || null }]);

    // If the reply is scoped to a card via a reference chip, treat it as
    // a custom resolution of that card (matches the old "something else…"
    // semantics, just routed through the bottom composer).
    if (refKey === "card1" || refKey === "card2") {
      const customLine = `logged "${text}". i'll work on it and bring you the answer when it's ready.`;
      const resolveCard = () => {
        if (refKey === "card1") {
          setC1({ tone: "muted", line: customLine });
          setC1Done(true);
        } else {
          setC2({ tone: "muted", line: customLine });
          setC2Done(true);
        }
        appendAgentToThread(customLine);
        // Card 1 → chain card 2 question.
        if (refKey === "card1") {
          const d = customLine.length * 8 + 500;
          setTimeout(() => {
            appendAgentToThread(
              "and a smaller pattern question — feels like a billing mistake on their end.",
              {
                cardProps: {
                  label: collapsed.label,
                  headlineHtml: "11 ups commercial addresses got the residential fee",
                  bodyHtml: `same warehouse, same accounts, last 4 days. i can file all 11 as one batch claim, or wait a week to see if the pattern grows. <span style=\"color:${C.amber}\">$1,832</span> at stake.`,
                  lean: "lean toward filing — the pattern's already clear.",
                  chips: c2Chips,
                },
                chipsTarget: "card2",
              }
            );
          }, d);
        }
      };
      // Mid-stream protection: wait for any in-flight typewriter to finish
      // before appending the agent's confirmation.
      afterStream(resolveCard);
      setComposerRef(null);
      return;
    }

    setThread(t => [...t, { id: aid, kind: "agent", text: "thinking…", thinking: true }]);
    const reply = PROMPT_REPLIES[text]
      || (QUICK_ACTIONS.find(qa => qa.label === text) || {}).reply
      || "logged. i'll work on this and bring you the answer when it's ready.";
    // Mid-stream: defer the "thinking → reply" swap until current message lands.
    afterStream(() => {
      setTimeout(() => {
        setThread(t => t.map(item => item.id === aid ? { ...item, text: reply, thinking: false } : item));
      }, 600);
    });
    const replyTypeMs = 600 + reply.length * 8 + 600;
    setTimeout(() => {
      setThread(t => {
        const last = [...t].reverse().find(it => it.kind === "agent" && !it.thinking);
        if (last && last.reaskFor) return t;
        const threadCard = [...t].reverse().find(it => it.kind === "agent" && it.cardProps);
        if (threadCard) {
          const idx = t.indexOf(threadCard);
          const after = t.slice(idx + 1);
          const ANSWERED_PREFIXES = ["batch sent", "holding for a week", "opened in patterns", "logged \""];
          const answered = after.some(it => it.kind === "agent" && ANSWERED_PREFIXES.some(p => (it.text || "").startsWith(p)));
          if (!answered) {
            const rid = `r-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
            return [...t, {
              id: rid, kind: "agent",
              reaskFor: "card2",
              text: "anyway — still on you for the 11 reclassifications.",
              chips: c2Chips,
              contextLabel: "the 11 ups reclassifications",
            }];
          }
          return t;
        }
        const reaskFor = !c1 ? "card1" : (!c2 ? "card2" : null);
        if (!reaskFor) return t;
        const rid = `r-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
        const reaskText = reaskFor === "card1"
          ? "anyway — still on you for the fedex denial."
          : "anyway — still on you for the 11 reclassifications.";
        const reaskChips = reaskFor === "card1" ? c1Chips : c2Chips;
        const ctxLabel = reaskFor === "card1" ? "#VB-44087" : "the 11 ups reclassifications";
        return [...t, {
          id: rid, kind: "agent",
          reaskFor,
          text: reaskText,
          chips: reaskChips,
          contextLabel: ctxLabel,
        }];
      });
    }, replyTypeMs);
  }, [setView, c1, c2, c1Chips, c2Chips, afterStream, collapsed]);

  // Append an agent line directly to the thread — used when the user has
  // already gone "off-script" by asking a prompt or typing into the
  // composer, and then comes back to pick an action chip on a card. The
  // resolved line lands in chronological order at the bottom of the
  // conversation rather than in the card's original transcript position.
  // `extras` may include { chips, questionHtml, leadHtml } so the appended
  // turn can carry a follow-up question with its own inline actions.
  const appendAgentToThread = useCallback((text, extras = {}) => {
    const aid = `a-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    setThread(t => [...t, { id: aid, kind: "agent", text, ...extras }]);
  }, []);

  // Append a user-turn for a chip click. Every user input — chip click or
  // freeform reply — produces a right-aligned user turn so the thread is
  // a complete, replayable conversation log.
  const appendUserChip = useCallback((label) => {
    const uid = `u-${Date.now()}-${Math.random().toString(36).slice(2,6)}`;
    setThread(t => [...t, { id: uid, kind: "user", text: label, fromChip: true }]);
  }, []);

  // Wrap a card's onPick so every chip click renders a user-turn first,
  // and the agent's resolution waits for any in-flight typewriter to
  // complete before landing. Undo (c === null) and custom (c.custom) are
  // pass-through. Returns a wrapped onPick.
  const withUserTurnAndStream = useCallback((inner) => (c) => {
    // Undo / null pass through.
    if (c === null) { inner(c); return; }
    // Custom (composer-routed) replies already produced a user turn via
    // onAsk; don't double-emit.
    if (c.custom) { inner(c); return; }
    appendUserChip(c.label);
    afterStream(() => inner(c));
  }, [appendUserChip, afterStream]);

  // ─── Mid-stream protection: see streamingRef declarations above.

  const bothResolved = c1 && c2;

  // A card is "superseded" when the user tangented away and the agent
  // re-asked the same question in the thread — the original chips above
  // should disable so the user answers the latest prompt rather than
  // double-resolving via a stale card.
  const card1Superseded = !c1 && thread.some(it => it.kind === "agent" && it.reaskFor === "card1");
  const card2Superseded = !c2 && thread.some(it => it.kind === "agent" && it.reaskFor === "card2");

  // Conversational typing for the post-resolution recap. Each line types in
  // after the previous one finishes, mimicking a real reply chain.
  //
  // We FREEZE `recovered` at the moment the recap line first becomes
  // reachable. Without this, the live activity feed (which increments
  // `recovered` every 25–40s when a recovery lands) would mutate the
  // string passed to <Typewriter>, which used to restart the animation
  // from zero and visually blank the recap line. The Typewriter latch is
  // the primary defense; freezing here keeps the displayed dollar figure
  // stable as a bonus (the recap is a snapshot of "as of when we said it",
  // not a live counter).
  const recoveredFrozen = useRef(null);
  if (recoveredFrozen.current === null && (c1 || c2)) {
    recoveredFrozen.current = recovered;
  }
  const recoveredForRecap = recoveredFrozen.current ?? recovered;
  const SETTLED_LINE = "that's everything you need to call. here's the rest.";
  const RECOVERED_LINE = `you've reclaimed $${fmt$(recoveredForRecap)} across 14 sealed claims this month — oct 1 to oct 28.`;
  useEffect(() => {
    if (!bothResolved || !c2Done) return;
    const t1 = setTimeout(() => setSettledLineDone(true), 200 + SETTLED_LINE.length * 8 + 250);
    return () => clearTimeout(t1);
  }, [bothResolved, c2Done]);
  useEffect(() => {
    if (!settledLineDone) return;
    const t = setTimeout(() => setRecoveredLineDone(true), 200 + RECOVERED_LINE.length * 8 + 250);
    return () => clearTimeout(t);
  }, [settledLineDone, RECOVERED_LINE.length]);

  // Identify the most-recent agent turn so the accent line + caret only land
  // on it. Order of agent surfaces (from top of transcript downward):
  //   opener, card1, transition-line, card2, settled-line, ledger,
  //   next-thing-line, then any thread items.
  // The "current" one is the last reachable in the current render state.
  const lastThreadAgent = [...thread].reverse().find(it => it.kind === "agent");
  let currentKey;
  if (lastThreadAgent) currentKey = `thread:${lastThreadAgent.id}`;
  else if (bothResolved) currentKey = "next-thing";
  else if (c1 && !c2) currentKey = "card2";
  else if (c1 && c2) currentKey = "settled-line";
  else currentKey = "card1";

  return (
    <ActiveInputCtx.Provider value={activeInputCtxValue}>
    <div style={{
      display: "flex", flex: 1, minHeight: 0, width: "100%",
      maxWidth: 1440, margin: "0 auto", position: "relative",
      height: "100%", overflow: "hidden",
    }}>
      {/* ───── TRANSCRIPT (center) ─────
          The transcript column owns its own vertical scroll. The composer
          is anchored to the bottom of the column via position:sticky so
          new agent turns don't push it downward — mirroring Claude's
          pattern. The right rail is a sibling that scrolls independently. */}
      <div ref={scrollRef} style={{
        display: "flex", flexDirection: "column", flex: 1, minWidth: 0,
        padding: "56px 48px 0", gap: 28, maxWidth: 760, margin: "0 auto",
        width: "100%",
        overflowY: "auto",
        height: "100%",
      }} className="k-scroll">
        <AgentLine time="8:02a" delay={0}>
          <Typewriter text="two things to clear this morning. the bigger one first." speed={8} />
        </AgentLine>

        <CardMessage
          label={expanded.label}
          typed
          startDelay={1250}
          headlineHtml={`fedex denied <em style="font-style:italic;font-weight:500">#VB-44087</em>'s late-delivery claim`}
          bodyHtml={expanded.briefing}
          lean={expanded.lean}
          chips={c1Chips}
          resolved={c1}
          superseded={card1Superseded}
          cardKey="card1"
          contextLabel="#VB-44087"
          isCurrent={currentKey === "card1"}
          onTyped={() => setCard1Typed(true)}
          onCustom={() => focusComposerForCard("card1")}
          onPick={withUserTurnAndStream((c) => {
            if (c === null) { setC1(null); setC1Done(false); setCard1Typed(true); return; }
            // If the user has already gone off-script (sent a prompt or
            // typed in the composer), append the resolved line to the
            // thread so it lands chronologically below their last reply
            // instead of in the card's original transcript position.
            // Then queue card 2's question as a follow-up thread turn so
            // the conversation continues forward.
            if (thread.length > 0) {
              appendAgentToThread(c.outcome.line);
              // Delay just long enough for the resolved line to type in,
              // so the next turn feels like a real reply, not a dump.
              const tdelay = c.outcome.line.length * RESOLVED_SPEED + 500;
              setTimeout(() => {
                appendAgentToThread(
                  "and a smaller pattern question — feels like a billing mistake on their end.",
                  {
                    cardProps: {
                      label: collapsed.label,
                      headlineHtml: "11 ups commercial addresses got the residential fee",
                      bodyHtml: `same warehouse, same accounts, last 4 days. i can file all 11 as one batch claim, or wait a week to see if the pattern grows. <span style="color:${C.amber}">$1,832</span> at stake.`,
                      lean: "lean toward filing — the pattern's already clear.",
                      chips: c2Chips,
                    },
                    chipsTarget: "card2",
                  }
                );
              }, tdelay);
              if (c.then) c.then();
              return;
            }
            // Custom input ("something else…") on a clean linear path:
            // resolve card 1 in place (it shows c.outcome.line on the
            // muted card itself), then queue "and a smaller…" + card 2
            // into the thread once c1's resolved line has finished
            // typing — so the second question lands chronologically
            // after the first answer rather than abruptly above it.
            setC1(c.outcome);
            const ms = c.outcome.line.length * RESOLVED_SPEED + RESOLVED_GAP;
            setTimeout(() => setC1Done(true), ms);
            if (c.custom) {
              setTimeout(() => {
                appendAgentToThread(
                  "and a smaller pattern question — feels like a billing mistake on their end.",
                  {
                    cardProps: {
                      label: collapsed.label,
                      headlineHtml: "11 ups commercial addresses got the residential fee",
                      bodyHtml: `same warehouse, same accounts, last 4 days. i can file all 11 as one batch claim, or wait a week to see if the pattern grows. <span style="color:${C.amber}">$1,832</span> at stake.`,
                      lean: "lean toward filing — the pattern's already clear.",
                      chips: c2Chips,
                    },
                    chipsTarget: "card2",
                  }
                );
              }, ms + 200);
            }
            if (c.then) c.then();
          })}
        />

        {c1 && c1Done && (
          <AgentLine time="just now" delay={120}>
            <Typewriter text="and a smaller pattern question — feels like a billing mistake on their end." speed={8} delay={200} />
          </AgentLine>
        )}

        {c1 && c1Done && thread.length === 0 && (
          <CardMessage
            label={collapsed.label}
            typed
            startDelay={1700}
            headlineHtml="11 ups commercial addresses got the residential fee"
            bodyHtml={`same warehouse, same accounts, last 4 days. i can file all 11 as one batch claim, or wait a week to see if the pattern grows. <span style="color:${C.amber}">$1,832</span> at stake.`}
            lean="lean toward filing — the pattern's already clear."
            chips={c2Chips}
            resolved={c2}
            superseded={card2Superseded}
            cardKey="card2"
            contextLabel="the 11 ups reclassifications"
            isCurrent={currentKey === "card2"}
            onTyped={() => setCard2Typed(true)}
            onCustom={() => focusComposerForCard("card2")}
            onPick={withUserTurnAndStream((c) => {
              if (c === null) { setC2(null); setC2Done(false); return; }
              if (thread.length > 0) {
                appendAgentToThread(c.outcome.line);
                if (c.then) c.then();
                return;
              }
              setC2(c.outcome);
              const ms = c.outcome.line.length * RESOLVED_SPEED + RESOLVED_GAP;
              setTimeout(() => setC2Done(true), ms);
              if (c.then) c.then();
            })}
          />
        )}

        {bothResolved && c2Done && (
          <AgentLine time="just now" delay={120} isCurrent={currentKey === "settled-line"}>
            <Typewriter text={SETTLED_LINE} speed={8} delay={200} />
          </AgentLine>
        )}

        {bothResolved && settledLineDone && (
          <AgentLine time="just now">
            <RichTypewriter
              html={`you've reclaimed <span style="color:${C.amber};font-variant-numeric:tabular-nums">$${fmt$(recovered)}</span> across 14 sealed claims this month — oct 1 to oct 28.`}
              speed={8}
              delay={200}
            />
          </AgentLine>
        )}

        {bothResolved && recoveredLineDone && (
          <div className="k-fade-in" style={{ paddingLeft: 14 }}>
            <button onClick={() => setShowLedger(s => !s)} className="k-mono" style={{
              background: "transparent", border: "none", color: C.textSec,
              fontSize: 11.5, letterSpacing: 0.01, cursor: "pointer",
              padding: 0, textDecoration: "underline", textDecorationColor: C.border,
              fontFamily: "'Geist Mono', ui-monospace, monospace",
            }}>
              {showLedger ? "hide the ledger ↑" : "show me the ledger →"}
            </button>
            {showLedger && (
              <div className="k-fade-in k-mono" style={{
                marginTop: 12, display: "grid", gridTemplateColumns: "auto 1fr auto", rowGap: 6, columnGap: 14,
                fontSize: 11, color: C.textSec, maxWidth: 520,
              }}>
                <span style={{ color: C.amber, fontVariantNumeric: "tabular-nums" }}>+$487.00</span>
                <span>ups · #VB-44102 · today 11:47a</span>
                <span style={{ color: C.textMuted }}>↘ counted</span>
                <span style={{ color: C.amber, fontVariantNumeric: "tabular-nums" }}>+$1,232.00</span>
                <span>fedex · #VB-43509 · oct 14</span>
                <span style={{ color: C.textMuted }}>↘ counted</span>
                <span style={{ color: C.amber, fontVariantNumeric: "tabular-nums" }}>+$214.00</span>
                <span>ups · #VB-43881 · yesterday</span>
                <span style={{ color: C.textMuted }}>↘ counted</span>
                <span style={{ color: C.mint, fontVariantNumeric: "tabular-nums" }}>+$12.47</span>
                <span>ups · #VB-43998 · filing now</span>
                <span style={{ color: C.mint }}>⏳ pending</span>
              </div>
            )}
          </div>
        )}

        {bothResolved && recoveredLineDone && (
          <AgentLine time="settled" delay={240} mono isCurrent={currentKey === "next-thing"}>
            <Typewriter text="i'll bring you the next thing when it's ready." speed={8} delay={200} />
          </AgentLine>
        )}

        {/* Threaded user/agent messages from the chat surface */}
        {thread.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 18, marginTop: 8 }}>
            {thread.map(item => item.kind === "user"
              ? <UserLine key={item.id}>{item.text}</UserLine>
              : (
                <AgentLine key={item.id} time="just now" mono isCurrent={currentKey === `thread:${item.id}`}>
                  {item.thinking
                    ? <span style={{ color: C.textMuted }}><span className="k-blink">●</span> thinking…</span>
                    : <Typewriter
                        text={item.text}
                        speed={8}
                        delay={120}
                        onDone={() => markStreamingDone(item.id)}
                      />}
                  {/* Optional follow-up card rendered as a real CardMessage
                      so fonts, spacing, and chip-reveal sequencing match
                      the rest of the conversation exactly. The card waits
                      for the preceding text to finish typing, then runs
                      its own internal cascade (headline → body → lean →
                      chips) just like the top-of-page cards. */}
                  {item.cardProps && (() => {
                    const textLen = (item.text || "").length;
                    // Text starts at delay=120 and types at 18ms/char,
                    // so it finishes at 120 + textLen*18. Add a 350ms
                    // breath before the card begins.
                    const cardStart = 120 + textLen * 8 + 350;
                    return (
                      <div style={{ marginTop: 14 }}>
                        <CardMessage
                          {...item.cardProps}
                          typed
                          startDelay={cardStart}
                          isCurrent={false}
                          nested
                          cardKey={item.id}
                          contextLabel={item.chipsTarget === "card2" ? "the 11 ups reclassifications" : undefined}
                          onTyped={() => setCard2Typed(true)}
                          onCustom={() => focusComposerForCard("card2")}
                          onPick={withUserTurnAndStream((c) => {
                            if (item.chipsTarget === "card2") {
                              if (c === null) return;
                              appendAgentToThread(c.outcome.line);
                              const d1 = c.outcome.line.length * RESOLVED_SPEED + 500;
                              setTimeout(() => {
                                appendAgentToThread(SETTLED_LINE);
                              }, d1);
                              const d2 = d1 + SETTLED_LINE.length * 8 + 500;
                              setTimeout(() => {
                                appendAgentToThread(RECOVERED_LINE);
                              }, d2);
                              const d3 = d2 + RECOVERED_LINE.length * 8 + 500;
                              setTimeout(() => {
                                appendAgentToThread("i'll bring you the next thing when it's ready.");
                              }, d3);
                              if (c.then) c.then();
                            }
                          })}
                        />
                      </div>
                    );
                  })()}
                  {/* Soft re-ask — renders the chips inline beneath the
                      agent's tangent reply so the user can answer the
                      open card-question without scrolling back up. The
                      "something else…" affordance comes along for free
                      via InlineActions. Picking a chip resolves the
                      original card silently and continues the thread. */}
                  {item.reaskFor && (() => {
                    const textLen = (item.text || "").length;
                    const chipsStart = 120 + textLen * 8 + 280;
                    return (
                      <DelayedReveal ms={chipsStart}>
                        <InlineActions
                          chips={item.chips}
                          cardKey={item.id}
                          contextLabel={item.contextLabel}
                          onCustom={() => focusComposerForCard(item.reaskFor)}
                          onPick={withUserTurnAndStream((c) => {
                            if (item.reaskFor === "card1") {
                              // Resolve card1 silently up the page; chain
                              // forward the same way the original onPick
                              // does in thread mode (queue card2).
                              setC1(c.outcome);
                              setC1Done(true);
                              appendAgentToThread(c.outcome.line);
                              if (!c.custom) {
                                const delay = c.outcome.line.length * RESOLVED_SPEED + 500;
                                setTimeout(() => {
                                  appendAgentToThread(
                                    "and a smaller pattern question — feels like a billing mistake on their end.",
                                    {
                                      cardProps: {
                                        label: collapsed.label,
                                        headlineHtml: "11 ups commercial addresses got the residential fee",
                                        bodyHtml: `same warehouse, same accounts, last 4 days. i can file all 11 as one batch claim, or wait a week to see if the pattern grows. <span style="color:${C.amber}">$1,832</span> at stake.`,
                                        lean: "lean toward filing — the pattern's already clear.",
                                        chips: c2Chips,
                                      },
                                      chipsTarget: "card2",
                                    }
                                  );
                                }, delay);
                              }
                              if (c.then) c.then();
                            } else if (item.reaskFor === "card2") {
                              // Resolve card 2 silently and append the
                              // outcome line to the thread. The original
                              // card 2 above is hidden once thread.length
                              // > 0 (along with the recap cascade) so the
                              // resolution lands chronologically in the
                              // thread rather than splitting between the
                              // original position and the bottom.
                              setC2(c.outcome);
                              setC2Done(true);
                              appendAgentToThread(c.outcome.line);
                              if (!c.custom) {
                                const d1 = c.outcome.line.length * RESOLVED_SPEED + 500;
                                setTimeout(() => {
                                  appendAgentToThread(SETTLED_LINE);
                                }, d1);
                                const d2 = d1 + SETTLED_LINE.length * 8 + 500;
                                setTimeout(() => {
                                  appendAgentToThread(RECOVERED_LINE);
                                }, d2);
                                const d3 = d2 + RECOVERED_LINE.length * 8 + 500;
                                setTimeout(() => {
                                  appendAgentToThread("i'll bring you the next thing when it's ready.");
                                }, d3);
                              }
                              if (c.then) c.then();
                            }
                          })}
                        />
                      </DelayedReveal>
                    );
                  })()}
                </AgentLine>
              )
            )}
          </div>
        )}

        {/* Spacer keeps the last message from sliding under the sticky composer. */}
        <div aria-hidden style={{ height: 24 }} />

        {/* Composer — sticky to the bottom of the scroll viewport. Pulled
            out of the message flow so new agent turns don't push it
            downward. A soft fade above it lets the last message drift
            behind it instead of clipping. Mirrors Claude's pattern. */}
        <div style={{
          position: "sticky", bottom: 0, marginTop: "auto",
          paddingTop: 32, paddingBottom: 24,
          background: `linear-gradient(to bottom, transparent, ${C.bg} 28%, ${C.bg} 100%)`,
        }}>
          <AskKlemr onSend={onAsk} referenceChip={composerRef} onDismissReference={dismissComposerRef} focusSignal={composerFocusN} prompts={(() => {
            // No thread → original linear logic.
            if (thread.length === 0) {
              if (!c1 && card1Typed) return PROMPTS_CARD1;
              if (c1 && c1Done && !c2 && card2Typed) return PROMPTS_CARD2;
              if (bothResolved && recoveredLineDone) return PROMPTS_RECAP;
              return null;
            }
            // Thread mode → derive from thread contents.
            // Find the latest agent item that carries a follow-up card
            // (card 2 routed into thread).
            const latestCardItem = [...thread].reverse().find(it => it.kind === "agent" && it.cardProps);
            if (latestCardItem) {
              // Find any later items appended after this card was acked
              // (the recap cascade: SETTLED_LINE, RECOVERED_LINE, etc.).
              const idx = thread.indexOf(latestCardItem);
              const afterCard = thread.slice(idx + 1);
              // Recap reached → show recap prompts.
              if (afterCard.some(it => it.text === "i'll bring you the next thing when it's ready.")) {
                return PROMPTS_RECAP;
              }
              // Card 2 in thread is still awaiting an answer — show its
              // contextual prompts once it's finished typing.
              if (afterCard.length === 0 && card2Typed) {
                return PROMPTS_CARD2;
              }
              return null;
            }
            // Fallback: card 2 was resolved via re-ask while sitting in its
            // original position. The original-location recap renders are
            // suppressed in thread mode (per Bug 1 fix), so the recap arrives
            // via appendAgentToThread instead. Detect that recap completed by
            // checking for the "next thing" line in the thread.
            const recapInThread = thread.some(
              it => it.kind === "agent" &&
              (it.text || "").startsWith("i'll bring you the next thing")
            );
            if (recapInThread) return PROMPTS_RECAP;
            return null;
          })()} />
        </div>
      </div>

      {/* ───── MARGIN — live feed (unchanged) ───── */}
      <ActingOnRail logEntries={logEntries} openDossier={openDossier} setView={setView} />
    </div>
    </ActiveInputCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ActingOnRail — peripheral activity panel on Overview.
// Lives in the right margin: a quiet, slow-moving column the user can glance at
// without losing focus on the inbox. Refreshes only when the agent actually
// completes something (~25–60s in real terms).
// ─────────────────────────────────────────────────────────────────────────────
// One column of readable sentences in the agent's voice. Layout per row:
//   [colored dot]  [relative time]  [single sentence]
// The newest entry pulses; its row carries an amber left border that fades
// after ~3s via CSS transition. Timestamps re-render every 30s.
// ─────────────────────────────────────────────────────────────────────────────

// Render a unix-ms timestamp as a short relative string ("now", "3m", "1h").
function relTime(createdAt, nowMs) {
  const sec = Math.max(0, Math.floor((nowMs - createdAt) / 1000));
  if (sec < 45) return "now";
  const min = Math.round(sec / 60);
  if (min < 60) return `${min}m`;
  const hr = Math.round(min / 60);
  if (hr < 24) return `${hr}h`;
  return `${Math.round(hr / 24)}d`;
}

// Same timestamp, formatted as 12h clock for the hover tooltip.
function absTime(createdAt) {
  const d = new Date(createdAt);
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, "0")}${ampm}`;
}

const ActingOnRail = memo(function ActingOnRail({ logEntries, openDossier, setView }) {
  // Single 30s ticker drives all relative-time labels — cheaper than per-row.
  const [nowMs, setNowMs] = useState(() => Date.now());
  useEffect(() => {
    const t = setInterval(() => setNowMs(Date.now()), 30000);
    return () => clearInterval(t);
  }, []);

  // Cap visible feed at 12; older entries fall off as new ones land.
  const visible = logEntries.slice(0, 12);
  const newest = visible[0];
  const newestAge = newest ? Math.max(0, Math.floor((nowMs - newest.createdAt) / 1000)) : 0;
  const lastUpdateLabel =
    !newest ? "—" :
    newestAge < 5 ? "just now" :
    newestAge < 60 ? `${newestAge}s ago` :
    newestAge < 3600 ? `${Math.floor(newestAge / 60)}m ago` :
    `${Math.floor(newestAge / 3600)}h ago`;

  const extractShip = (text) => {

  return (
    <aside className="k-scroll" style={{

        {visible.map((entry, i) => (
          <FeedRow
            key={entry.id}
            entry={entry}
            isNewest={i === 0}
            nowMs={nowMs}
            onOpen={() => {
              const ship = extractShip(entry.text);
              if (ship && openDossier) openDossier(ship);
            }}
          />
        ))}
      </div>

      <div style={{ marginTop: "auto", paddingTop: 18, borderTop: `1px solid ${C.border}`, display: "flex", flexDirection: "column", gap: 6 }}>
        <div className="k-mono" style={{ fontSize: 10.5, color: C.textMuted, letterSpacing: "0.04em" }}>
          1,247 shipments · last update {lastUpdateLabel}
        </div>
        <div className="k-mono" style={{ fontSize: 11, color: C.textMuted, letterSpacing: "0.02em" }}>
          showing the last 2 hours

// FeedRow — [dot · time · sentence]. Newest entry pulses; its row gets an
// amber left border that fades after ~3s via CSS transition.
const FeedRow = memo(function FeedRow({ entry, isNewest, nowMs, onOpen }) {
  const stage = entry.stage ? STAGE_BY_KEY[entry.stage] : null;
  const dotColor = stage ? stage.color : C.textMuted;
  const clickable = /#VB-\d+/.test(entry.text);

  // Active-row treatment: flip in `is-active` immediately so the amber border
  // shows, then on the next tick add `is-faded` so the CSS transition fades
  // it back to transparent.
  const [faded, setFaded] = useState(false);
  useEffect(() => {
    if (!isNewest) return;
    setFaded(false);
    const t = setTimeout(() => setFaded(true), 50);
    return () => clearTimeout(t);
  }, [isNewest, entry.id]);

  return (
    <div
      className={`k-feed-row k-slide-in ${isNewest ? "is-active" : ""} ${faded ? "is-faded" : ""}`}
      onClick={clickable ? onOpen : undefined}

        cursor: clickable ? "pointer" : "default",

        className={`k-feed-dot ${isNewest ? "k-feed-dot-pulse" : ""}`}
        style={{ background: dotColor, color: dotColor }}
      />
      <div
        className={`k-mono ${isNewest ? "k-flash" : ""}`}
        title={absTime(entry.createdAt)}
        style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.02em", paddingTop: 5, fontVariantNumeric: "tabular-nums" }}
      >
        {relTime(entry.createdAt, nowMs)}

      <div style={{ fontSize: 13, color: C.text, lineHeight: 1.55, fontFamily: "'Geist', system-ui, sans-serif" }}>
        {entry.text}
      </div>
    </div>
  );
}, (prev, next) => prev.entry.id === next.entry.id && prev.isNewest === next.isNewest && prev.nowMs === next.nowMs);

// Synthetic ledger — pads the hand-curated DOSSIERS list with realistic
// "boring" rows so the file-cabinet feel is honest. Most shipments are
// uneventful; the few that aren't are why the dossier is there.
const FILLER_DOSSIERS = (() => {
  const carriers = ["UPS", "FedEx", "USPS", "UPS", "UPS", "FedEx"];
  const wts = [0.9, 1.4, 2.1, 3.6, 0.7, 1.8, 5.2, 0.6, 2.8];
  const dims = ["8×6×4", "10×8×6", "12×10×8", "14×10×4", "9×9×9", "6×4×3"];
  const states = ["watching", "in_transit", "watching", "in_transit", "in_transit", "reclaimed"];
  const notes = [
    "clean. no anomalies.",
    "watching for departure scan.",
    "small one. nothing yet.",
    "manifest matches. just waiting.",
    "fee logic looks normal.",
    null, null,
  ];
  const out = [];
  for (let i = 0; i < 18; i++) {
    const id = `VB-${44250 - i * 3}`;
    const carrier = carriers[i % carriers.length];
    const state = states[i % states.length];
    const reclaimed = state === "reclaimed";
    out.push({
      id, carrier, state,
      evidence: [
        { label: "manifest captured", time: `${(i % 9) + 1}d ago`, done: true },
        { label: `dimensions logged · ${dims[i % dims.length]}`, time: `${(i % 9) + 1}d ago`, done: true },
        { label: `weight · ${wts[i % wts.length]} lb`, time: `${(i % 9) + 1}d ago`, done: true },
        ...(reclaimed
          ? [{ label: "credit confirmed", time: "this week", done: true, ours: true }]
          : state === "watching"
            ? [{ label: "awaiting departure scan", time: "—", done: false, pending: true }]
            : [{ label: "in transit", time: "—", done: false, pending: true }]),
      ],
      note: notes[i % notes.length], noteRotate: ((i % 5) - 2),
      amount: reclaimed ? +(3 + (i % 7) * 1.4).toFixed(2) : null,
      filler: true,
    });
  }
  return out;
})();

// One-of-many evidence step — rendered as a tiny chip in the row preview.
// Lifecycle stages mapped to chip positions (Change 5).
// Tick i ↔ LIFECYCLE[i].key. The first 3 are mint (label/pickup/transit),
// tick 4 (invoice) is red but only fills once the invoice has landed,
// 5+ are filed/pushback/paid.
const TICK_STAGES = ["label", "pickup", "transit", "invoice", "filed", "pushback", "paid"];
const TICK_STATUS_BY_DOSSIER_STATE = {
  watching:   ["captured", "pending",  "pending",  "pending",  "pending", "pending", "pending"],
  in_transit: ["captured", "sealed",   "following","pending",  "pending", "pending", "pending"],
  invoiced:   ["captured", "sealed",   "followed", "landed",   "pending", "pending", "pending"],
  filing:     ["captured", "sealed",   "followed", "caught",   "filed",   "pending", "pending"],
  reclaimed:  ["captured", "sealed",   "followed", "caught",   "filed",   "—",       "reclaimed"],
};

function EvidenceChip({ ev, position = 0, dossierState }) {
  const stageKey = TICK_STAGES[position];
  const stage = STAGE_BY_KEY[stageKey];
  const statusList = TICK_STATUS_BY_DOSSIER_STATE[dossierState] || [];
  const status = statusList[position] || (ev.pending ? "pending" : "captured");
  const isPending = status === "pending" || ev.pending;

  // Color by lifecycle stage; pending ticks fade to muted.
  const tone = isPending ? C.textMuted : (stage ? stage.color : (ev.flag ? C.red : C.mint));
  const bg = isPending
    ? "rgba(168,160,149,0.06)"
    : `${tone}1a`;
  const glyph = isPending ? "⋯" : ev.flag ? "!" : ev.ours ? "✦" : "✓";
  const titleStage = stage ? stage.short : "Evidence";
  return (
    <span
      title={`${titleStage} · ${status}`}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 16, height: 16, borderRadius: 4, background: bg,
        border: `1px solid ${tone}40`, fontSize: 10, color: tone,
        fontFamily: "JetBrains Mono, monospace", fontWeight: 700, flexShrink: 0,
      }}
    >
      {glyph}
    </span>
  );
}

      ? { ...p, state: "filed", age: "filed just now", note: "filed. carriers reply 3-7 business days." }
      : p));
  };

  // Sort: leaking now first (biggest $), then in-flight, then reclaimed
  const stateOrder = { actionable: 0, filed: 1, reclaimed: 2 };
  const sorted = [...patterns].sort((a, b) => {
    if (stateOrder[a.state] !== stateOrder[b.state]) return stateOrder[a.state] - stateOrder[b.state];
    return b.estimated - a.estimated;
  });

  return (
    <div style={{ padding: "32px 32px 64px", display: "flex", flexDirection: "column", gap: 28, maxWidth: 920, margin: "0 auto", width: "100%" }}>
      {/* Plain-language summary at top — answers "should I be worried?" */}

          the short version
        </div>
        <div className="k-display" style={{ fontSize: 22, color: C.text, lineHeight: 1.35, fontWeight: 400, letterSpacing: "-0.01em" }}>
          {totalLeakingCount > 0 ? (
            <>You're leaking about <span style={{ color: C.red }}>${fmt$(totals.leaking)}</span>/month from <span style={{ color: C.text, fontWeight: 500 }}>{totalLeakingCount} recurring issues</span>. Klemr's already flagged them — just pick what to do below.</>
          ) : (
            <>No active leaks right now. Klemr's watching.</>
          )}
        </div>
        <div className="flex items-center" style={{ gap: 24, marginTop: 18, flexWrap: "wrap" }}>
          <div>
            <div className="k-display" style={{ fontSize: 26, color: C.red, lineHeight: 1 }}>${fmt$(totals.leaking)}</div>
            <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4 }}>leaking now</div>
          </div>
          <div style={{ width: 1, height: 32, background: C.border }} />
          <div>
            <div className="k-display" style={{ fontSize: 26, color: C.blue, lineHeight: 1 }}>${fmt$(totals.inflight)}</div>
            <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4 }}>filed, waiting</div>
          </div>
          <div style={{ width: 1, height: 32, background: C.border }} />
          <div>
            <div className="k-display" style={{ fontSize: 26, color: C.amber, lineHeight: 1 }}>${fmt$(totals.reclaimed)}</div>
            <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4 }}>got back</div>
          </div>
        </div>
      </div>

      {/* The leaks themselves — single column, big and readable */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {sorted.map((p, i) => (
          <LeakCard key={p.id} p={p} index={i} onFile={() => fileNow(p.id)} />
        ))}
      </div>

      {/* Footer reassurance */}
      <div className="flex items-center" style={{ gap: 10, padding: "12px 16px", justifyContent: "center" }}>
        <Icon.Pulse size={11} color={C.mint} />
        <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.06em" }}>
          klemr keeps watching. new leaks show up here automatically.
        </span>
      </div>
    </div>
  );
}
