function KlemrSeal({ size = 36, color = C.amber, ink = false }) {
  const stroke = ink ? 1.6 : 1.4;
  const filterId = `k-ink-${size}-${color.replace('#','')}`;
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ display: "block", overflow: "visible" }}>
      {ink && (
        <defs><filter id={filterId}><feGaussianBlur stdDeviation="0.18" /></filter></defs>
      )}
      <g filter={ink ? `url(#${filterId})` : undefined} opacity={ink ? 0.94 : 1}>
        <circle cx="20" cy="20" r="18" fill="none" stroke={color} strokeWidth={stroke * 0.7} opacity="0.55" />
        <circle cx="20" cy="20" r="14.5" fill="none" stroke={color} strokeWidth={stroke} />
        {Array.from({ length: 8 }).map((_, i) => {
          const a = (i * Math.PI) / 4;
          return <line key={i} x1={20 + Math.cos(a) * 16.2} y1={20 + Math.sin(a) * 16.2} x2={20 + Math.cos(a) * 17.4} y2={20 + Math.sin(a) * 17.4} stroke={color} strokeWidth={stroke * 0.85} strokeLinecap="round" />;
        })}
        <line x1="14.5" y1="11.5" x2="14.5" y2="28.5" stroke={color} strokeWidth={stroke * 1.6} strokeLinecap="round" />
        <line x1="14.5" y1="20" x2="22" y2="12" stroke={color} strokeWidth={stroke * 1.6} strokeLinecap="round" />
        <line x1="17.5" y1="17" x2="25.5" y2="28" stroke={color} strokeWidth={stroke * 1.6} strokeLinecap="round" />
        <line x1="25.5" y1="28" x2="22.5" y2="28" stroke={color} strokeWidth={stroke * 1.6} strokeLinecap="round" />
        <circle cx="20" cy="6.5" r="0.9" fill={color} />
      </g>
    </svg>
  );
}

}

const HandNote = memo(function HandNote({ children, color = C.amberInk, rotate = -2, size = 18, delay = 0, style }) {
  const computedStyle = useMemo(() => ({
    "--r": `${rotate}deg`,
    fontFamily: "'Caveat', cursive",
    color, fontSize: size, lineHeight: 1.15,
    animationDelay: `${delay}s`,
    display: "inline-block", whiteSpace: "nowrap",
    ...(style || {}),
  }), []);
  return <span className="k-hand k-hand-anim" style={computedStyle}>{children}</span>;
});

function Sparkline({ severity, count }) {
  const bars = useMemo(() => {
    const seed = count + (severity === "high" ? 7 : severity === "med" ? 3 : 1);
    return Array.from({ length: 30 }, (_, i) => Math.abs(Math.sin(i * 1.7 + seed)) * 0.65 + Math.abs(Math.cos(i * 0.7 + seed)) * 0.35);
  }, [severity, count]);
  const color = severity === "high" ? C.red : severity === "med" ? C.amber : C.textSec;
  return (
    <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px" }}>
      <div className="flex items-center justify-between" style={{ marginBottom: 10 }}>
        <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase" }}>occurrences · last 30d</span>
        <span className="k-mono" style={{ fontSize: 9, color: C.textMuted }}>{count} hits</span>
      </div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 50 }}>
        {bars.map((v, i) => (
          <div key={i} style={{ flex: 1, height: `${Math.max(8, v * 100)}%`, background: v > 0.7 ? color : C.border, borderRadius: 2, opacity: v > 0.7 ? 1 : 0.55 }} />
        ))}
      </div>
    </div>
  );
}

// SETUP VIEW — onboarding flow

function SetupView() {
  const [step, setStep] = useState(0);
  const [carriers, setCarriers] = useState({ ups: true, fedex: true, usps: false, dhl: false });
  const [platform, setPlatform] = useState("shipstation");
  const [scanComplete, setScanComplete] = useState(false);
  const [scanProgress, setScanProgress] = useState(0);

  useEffect(() => {
    if (step !== 3 || scanComplete) return;
    const t = setInterval(() => {
      setScanProgress(p => {
        const np = p + 1.4 + Math.random() * 1.6;
        if (np >= 100) { setScanComplete(true); return 100; }
        return np;
      });
    }, 80);
    return () => clearInterval(t);
  }, [step, scanComplete]);

  const next = () => setStep(s => Math.min(s + 1, 3));
  const prev = () => setStep(s => Math.max(s - 1, 0));
  const reset = () => { setStep(0); setScanComplete(false); setScanProgress(0); };

  const stepDefs = [
    { n: 1, t: "your warehouse", d: "where the packages go out" },

                border: `1px solid ${active ? "rgba(247,185,85,0.3)" : "transparent"}`,
                display: "flex", gap: 12, cursor: done ? "pointer" : "default",
              }} onClick={() => done && setStep(i)}>
                <div style={{
                  width: 22, height: 22, borderRadius: 999,
                  border: `1px solid ${done || active ? C.amber : C.border}`,
                  background: done ? C.amber : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                }}>
                  {done ? <Icon.Check size={11} color={C.bg} /> : <span className="k-mono" style={{ fontSize: 10, color: active ? C.amber : C.textMuted, fontWeight: 600 }}>{s.n}</span>}
                </div>
                <div>

                  <div className="k-mono" style={{ fontSize: 10, color: C.textMuted, marginTop: 2 }}>{s.d}</div>
                </div>
              </div>
            );
          })}

        <div style={{ flex: 1 }} />
        <div style={{ padding: "14px 16px", border: `1px dashed ${C.border}`, borderRadius: 10, background: "rgba(94,234,212,0.03)" }}>
          <div className="k-mono" style={{ fontSize: 9, color: C.mintInk, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 6 }}>why klemr</div>

      </aside>

      {/* Step content */}
      <main style={{ display: "flex", flexDirection: "column" }}>
        <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 14 }}>step {step + 1} of 4</div>
        {step === 0 && <StepWarehouse />}
        {step === 1 && <StepCarriers carriers={carriers} setCarriers={setCarriers} />}
        {step === 2 && <StepPlatform platform={platform} setPlatform={setPlatform} />}

        <div className="flex items-center justify-between" style={{ paddingTop: 24, borderTop: `1px solid ${C.border}`, marginTop: 24 }}>
          <button className="k-btn k-btn-ghost" onClick={step === 0 ? reset : prev} disabled={step === 0}>← back</button>
          <div className="flex items-center" style={{ gap: 6 }}>
            {[0,1,2,3].map(i => (

            ))}
          </div>
          {step < 3 ? (
            <button className="k-btn k-btn-primary" onClick={next}>continue <Icon.Arrow size={11} color={C.bg} /></button>

// DOSSIER DETAIL — fullscreen overlay with timeline
// ─────────────────────────────────────────────────────────────────────────────
function DossierDetail({ dossier, onClose }) {
  const [cursor, setCursor] = useState(2);
  const [playing, setPlaying] = useState(false);

  useEffect(() => {
    if (!playing) return;
    if (cursor >= TIMELINE_STEPS.length - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setCursor(c => c + 1), 1100);
    return () => clearTimeout(t);
  }, [playing, cursor]);

  const reset = () => { setCursor(0); setPlaying(true); };
  const step = TIMELINE_STEPS[cursor];
  const meta = STATE_META[dossier.state];

  return (
    <>
      <div onClick={onClose} style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)",
        zIndex: 50, animation: "k-fade-in 0.2s ease-out",
      }} />
      <div style={{
        position: "fixed", top: 24, left: 24, right: 24, bottom: 24,
        background: C.bg, border: `1px solid ${C.borderBright}`, borderRadius: 14,
        zIndex: 51, animation: "k-slide-in 0.35s cubic-bezier(.2,.8,.2,1)",
        display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{ padding: "18px 28px", borderBottom: `1px solid ${C.border}`, background: C.bgElevated, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          <div className="flex items-center" style={{ gap: 14 }}>
            <Icon.Dossier size={16} color={C.amber} />
            <div>
              <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase" }}>
                dossier · #{dossier.id} · {dossier.carrier}
              </div>
              <div className="k-display" style={{ fontSize: 22, color: C.text, lineHeight: 1.05, marginTop: 2 }}>
                the dispute, end-to-end
              </div>
            </div>
            <div style={{ marginLeft: 16, padding: "4px 10px", borderRadius: 4, background: `${meta.color}1A`, border: `1px solid ${meta.color}50` }}>
              <span className="k-mono" style={{ fontSize: 9, color: meta.color, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600 }}>{meta.label}</span>
            </div>
          </div>
          <div className="flex items-center" style={{ gap: 10 }}>
            <button className="k-btn k-btn-ghost" onClick={reset}><Icon.Refresh size={11} color="currentColor" /> replay</button>
            <button className="k-btn k-btn-primary" onClick={() => setPlaying(p => !p)}>
              {playing ? <Icon.Pause size={11} color={C.bg} /> : <Icon.Play size={11} color={C.bg} />} {playing ? "pause" : "play"}
            </button>
            <button onClick={onClose} className="k-btn k-btn-ghost" style={{ padding: "9px" }}>
              <Icon.X size={13} color="currentColor" />
            </button>
          </div>
        </div>

        {/* Body */}
        <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", flex: 1, overflow: "hidden" }}>
          {/* Timeline rail */}
          <div className="k-scroll" style={{ padding: "26px 36px", overflowY: "auto", borderRight: `1px solid ${C.border}` }}>
            <div className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 18 }}>timeline · t = ship time</div>
            <div style={{ position: "relative", paddingLeft: 26 }}>
              <div style={{ position: "absolute", left: 7, top: 6, bottom: 6, width: 1, background: C.border }} />
              <div style={{ position: "absolute", left: 7, top: 6, width: 1, height: `${(cursor / (TIMELINE_STEPS.length - 1)) * 100}%`, background: `linear-gradient(180deg, ${C.amberDim}, ${C.amber})`, transition: "height 0.5s ease" }} />
              {TIMELINE_STEPS.map((s, i) => {
                const tColor = TL_TONE[s.tone];
                const actor = ACTORS[s.actor];
                const active = i === cursor, past = i < cursor, future = i > cursor;
                return (
                  <div key={i} onClick={() => { setCursor(i); setPlaying(false); }} style={{
                    position: "relative", paddingBottom: 18, cursor: "pointer", opacity: future ? 0.32 : 1, transition: "opacity .3s",
                  }}>
                    <div className={active ? "k-pulse" : ""} style={{
                      position: "absolute", left: -26, top: 4,
                      width: 15, height: 15, borderRadius: 999,
                      background: past || active ? tColor : C.bg,
                      border: `1.5px solid ${past || active ? tColor : C.border}`,
                      boxShadow: active ? `0 0 12px ${tColor}` : "none",
                      transition: "all .3s",
                    }} />
                    <div className="flex items-center" style={{ gap: 10, marginBottom: 4 }}>
                      <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, fontWeight: 600 }}>{s.t}</span>
                      <span className="k-mono" style={{ fontSize: 9, color: actor.color, letterSpacing: "0.12em", textTransform: "uppercase", background: `${actor.color}15`, padding: "2px 7px", borderRadius: 4 }}>{actor.label}</span>
                      <span className="k-mono" style={{ fontSize: 9, color: tColor, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 600 }}>· {TL_TONE_LABEL[s.tone]}</span>
                    </div>
                    <div style={{ fontSize: 14, color: active ? C.text : C.textSec, fontWeight: active ? 500 : 400, marginBottom: 3 }}>{s.title}</div>
                    <div className="k-mono" style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.4 }}>{s.body}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Evidence panel */}
          <div className="k-scroll" style={{ padding: "26px 32px", overflowY: "auto", background: C.bgElevated, display: "flex", flexDirection: "column", gap: 16 }}>
            <div className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase" }}>the dossier</div>
            <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16, position: "relative", boxShadow: cursor >= 4 ? `inset 0 0 0 1px ${C.amber}40` : "none", transition: "box-shadow .4s" }}>
              {cursor >= 4 && <div style={{ position: "absolute", top: 10, right: 10 }}><Icon.Lock size={13} color={C.amber} /></div>}
              <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 10 }}>package · #{dossier.id}</div>
              <div style={{
                height: 110, borderRadius: 8,
                background: `repeating-linear-gradient(135deg, ${C.bgCard}, ${C.bgCard} 8px, ${C.bgElevated} 8px, ${C.bgElevated} 16px)`,
                border: `1px solid ${C.border}`,
                display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 12,
              }}>
                {cursor >= 2 ? (
                  <div className="k-fade-in" style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                    <Icon.Camera size={20} color={C.textSec} />
                    <span className="k-mono" style={{ fontSize: 10, color: C.textSec }}>package photo · 9:16a</span>
                  </div>
                ) : (
                  <span className="k-mono" style={{ fontSize: 10, color: C.textMuted }}>awaiting photo…</span>
                )}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                <Stat label="dimensions" value="12×10×8" />
                <Stat label="weight" value="2.3 lb" accent={cursor >= 5 ? C.amber : null} />
                <Stat label="zone" value="5" />
              </div>
            </div>

            {cursor >= 5 && (
              <div className="k-fade-in" style={{ background: "rgba(248,113,113,0.04)", border: `1px solid rgba(248,113,113,0.25)`, borderRadius: 12, padding: 16 }}>
                <div className="k-mono" style={{ fontSize: 9, color: C.red, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 12, fontWeight: 600 }}>⚠ discrepancy detected</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 18px 1fr", gap: 10, alignItems: "center" }}>
                  <div style={{ background: C.bg, padding: 12, borderRadius: 8, border: `1px solid ${C.border}` }}>
                    <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 4 }}>dossier says</div>
                    <div className="k-display" style={{ fontSize: 24, color: C.amber }}>2.3 lb</div>
                    <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, marginTop: 2 }}>scale + photo, 9:15a</div>
                  </div>
                  <div style={{ textAlign: "center" }}><span className="k-mono" style={{ fontSize: 10, color: C.textMuted }}>vs</span></div>
                  <div style={{ background: C.bg, padding: 12, borderRadius: 8, border: `1px solid rgba(248,113,113,0.3)` }}>
                    <div className="k-mono" style={{ fontSize: 9, color: C.red, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 4 }}>ups billed</div>
                    <div className="k-display" style={{ fontSize: 24, color: C.red }}>4.0 lb</div>
                    <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, marginTop: 2 }}>dim weight applied</div>
                  </div>
                </div>
                {cursor >= 6 && (
                  <div className="k-fade-in flex items-center justify-between" style={{ marginTop: 12, padding: "10px 12px", background: C.bg, border: `1px dashed ${C.amber}50`, borderRadius: 8 }}>
                    <span className="k-mono" style={{ fontSize: 11, color: C.textSec }}>overcharge</span>
                    <span className="k-display" style={{ fontSize: 22, color: C.amber }}>$12.47</span>
                  </div>
                )}
              </div>
            )}

            {cursor >= 7 && (
              <div className="k-fade-in" style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16 }}>
                <div className="flex items-center" style={{ gap: 8, marginBottom: 8 }}>
                  <Icon.Receipt size={13} color={C.blue} />
                  <span className="k-mono" style={{ fontSize: 10, color: C.blue, letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 600 }}>dispute filed · #DR-22847</span>
                </div>
                <div className="k-mono" style={{ fontSize: 11, color: C.textSec, lineHeight: 1.5 }}>
                  submitted to ups capital portal with full dossier attached. we attached the photo, the scale reading, and the gps zone confirmation.
                </div>
              </div>
            )}

            {cursor >= 9 && (
              <div className="k-fade-in" style={{
                padding: "20px 18px", textAlign: "center", position: "relative",
                background: `linear-gradient(135deg, ${C.bgCard}, ${C.bgElevated})`,
                border: `1px solid ${C.borderBright}`, borderRadius: 12,
              }}>
                <div style={{ position: "absolute", top: 14, right: 14 }}>
                  <div className="k-stamp"><KlemrSeal size={44} color={C.amber} ink /></div>
                </div>
                <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 6 }}>credit posted</div>
                <div className="k-display" style={{ fontSize: 34, color: C.amber, lineHeight: 1 }}>+$12.47</div>
                <HandNote color={C.amberInk} rotate={-3} size={17} delay={0.4} style={{ marginTop: 10 }}>another one for the file.</HandNote>
              </div>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

function Stat({ label, value, accent }) {
  return (
    <div style={{ background: C.bgElevated, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px" }}>
      <div className="k-mono" style={{ fontSize: 8, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 2 }}>{label}</div>
      <div className="k-mono" style={{ fontSize: 13, color: accent || C.text, fontWeight: 600 }}>{value}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("overview");
  const [openDossier, setOpenDossier] = useState(null);

  const [recovered, setRecovered] = useState(42847.0);
  const [flash, setFlash] = useState(false);
  const [logEntries, setLogEntries] = useState(() => {
    const seed = [];
    for (let i = 0; i < 6; i++) {
      const tpl = ACTIVITY_TEMPLATES[Math.floor(Math.random() * ACTIVITY_TEMPLATES.length)];
      seed.push({ ...tpl, id: Math.random() });
    }
    return seed;
  });
  const [scanIdx, setScanIdx] = useState(0);
  const [scanProgress, setScanProgress] = useState(34);
  const [activeDossierCount] = useState(1247);
  const [pulse, setPulse] = useState(0);
  const flashTimer = useRef(null);

  // Inject styles once
  useEffect(() => {
    if (document.getElementById("klemr-styles")) return;
    const tag = document.createElement("style");
    tag.id = "klemr-styles";
    tag.textContent = STYLES;
    document.head.appendChild(tag);
  }, []);

  // Activity feed
  useEffect(() => {
    let timer;
    const tick = () => {
      const tpl = ACTIVITY_TEMPLATES[Math.floor(Math.random() * ACTIVITY_TEMPLATES.length)];
      const entry = { ...tpl, id: Math.random() };
      setLogEntries(prev => [entry, ...prev].slice(0, 20));
      if (entry.tone === "won" && entry.amount) {
        setRecovered(r => r + entry.amount);
        setFlash(true);
        clearTimeout(flashTimer.current);
        flashTimer.current = setTimeout(() => setFlash(false), 1500);
      }
      timer = setTimeout(tick, 1800 + Math.random() * 2600);
    };
    timer = setTimeout(tick, 2200);
    return () => { clearTimeout(timer); clearTimeout(flashTimer.current); };
  }, [pulse]);

  // Scan progress
  useEffect(() => {
    const t = setInterval(() => {
      setScanProgress(p => {
        const np = p + 1.0 + Math.random() * 1.8;
        if (np >= 100) { setScanIdx(i => (i + 1) % SCAN_TARGETS.length); return 4; }
        return np;
      });
    }, 240);
    return () => clearInterval(t);
  }, []);

  const spotCheck = useCallback(() => {
    setPulse(n => n + 1);
    setScanProgress(2);
    [0, 600, 1300, 1900].forEach((delay, idx) => {
      setTimeout(() => {
        const pool = idx === 3 ? ACTIVITY_TEMPLATES.filter(t => t.tone === "won") : ACTIVITY_TEMPLATES.filter(t => t.tone !== "won");
        const tpl = pool[Math.floor(Math.random() * pool.length)];
        const entry = { ...tpl, id: Math.random() };
        setLogEntries(prev => [entry, ...prev].slice(0, 20));
        if (entry.tone === "won" && entry.amount) {
          setRecovered(r => r + entry.amount);
          setFlash(true);
          setTimeout(() => setFlash(false), 1500);
        }
      }, delay);
    });
  }, []);

  const closeDossier = useCallback(() => setOpenDossier(null), []);
  const openDossierFn = useCallback((d) => setOpenDossier(d), []);

  const titles = {
    overview: { t: "Overview", s: "your warehouse, watched" },
    dossiers: { t: "Dossiers", s: "evidence locked, waiting" },
    patterns: { t: "Patterns", s: "what the agent has noticed" },
    setup: { t: "Setup", s: "connect your evidence sources" },
  };

  return (
    <div className="k-body" style={{ display: "flex", height: "100vh", background: C.bg, color: C.text }}>
      <Sidebar
        view={view} setView={setView}
        dossierCount={DOSSIERS.length}
        patternCount={PATTERNS_INIT.filter(p => p.state === "actionable").length}
      />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, overflow: "hidden" }}>
        <TopBar title={titles[view].t} subtitle={titles[view].s} recovered={recovered} flash={flash} onSpotCheck={spotCheck} />
        <div className="k-scroll" style={{ flex: 1, overflowY: "auto" }}>
          {view === "overview" && (
            <OverviewView
              recovered={recovered} flash={flash} logEntries={logEntries}
              scanIdx={scanIdx} scanProgress={scanProgress}
              activeDossierCount={activeDossierCount}
              setView={setView} openDossier={openDossierFn}
            />
          )}
          {view === "dossiers" && <DossiersView openDossier={openDossierFn} />}
          {view === "patterns" && <PatternsView />}
          {view === "setup" && <SetupView />}
        </div>
      </div>
      {openDossier && <DossierDetail dossier={openDossier} onClose={closeDossier} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<style>
  .flex { display: flex; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
