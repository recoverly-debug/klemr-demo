// ─────────────────────────────────────────────────────────────────────────────
// Brand: KlemrMark + Wordmark + Icons + HandNote
//
// The mark is an aperture (the agent's "lens" — watching every shipment),
// with three bracket notches at 4/8/12 o'clock representing the loop:
// collect evidence → audit invoice → reclaim. A sweep-arm crosses the dial
// (the agent's gaze + the diagonal of a stylized "K"); a filled dot at the
// tip is the moment of catching a discrepancy.
// ─────────────────────────────────────────────────────────────────────────────
function KlemrMark({ size = 36, color = C.amber, ink = false, animated = false }) {
  const stroke = ink ? 1.8 : 1.6;
  const filterId = `k-ink-${size}-${color.replace('#','')}`;
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ display: "block", overflow: "visible" }}>
      {ink && (
        <defs><filter id={filterId}><feGaussianBlur stdDeviation="0.18" /></filter></defs>
      )}
      <g filter={ink ? `url(#${filterId})` : undefined} opacity={ink ? 0.94 : 1}>
        {/* Outer aperture ring */}
        <circle cx="20" cy="20" r="17" fill="none" stroke={color} strokeWidth={stroke * 0.55} opacity="0.32" />
        <circle cx="20" cy="20" r="14" fill="none" stroke={color} strokeWidth={stroke} />

        {/* Three bracket notches — the loop: collect / audit / reclaim.
            Each is a short L-shape sitting just inside the inner ring. */}
        {[
          { a: -90, label: "collect" },   // 12 o'clock
          { a: 30,  label: "reclaim" },   // 4 o'clock
          { a: 150, label: "audit" },     // 8 o'clock
        ].map((n, i) => {
          const rad = (n.a * Math.PI) / 180;
          const r = 11.4;
          const cx = 20 + Math.cos(rad) * r;
          const cy = 20 + Math.sin(rad) * r;
          // tangent direction
          const tx = -Math.sin(rad), ty = Math.cos(rad);
          const nx = Math.cos(rad), ny = Math.sin(rad);
          const armLen = 2.4;
          return (
            <g key={i}>
              <line
                x1={cx - tx * armLen} y1={cy - ty * armLen}
                x2={cx} y2={cy}
                stroke={color} strokeWidth={stroke} strokeLinecap="round"
              />
              <line
                x1={cx} y1={cy}
                x2={cx + nx * armLen * 0.85} y2={cy + ny * armLen * 0.85}
                stroke={color} strokeWidth={stroke} strokeLinecap="round"
              />
            </g>
          );
        })}

        {/* Sweep-arm — the agent's gaze. This is also the diagonal stem of K.
            Starts near 10 o'clock on the inner ring, crosses through center
            and out toward 4 o'clock where the catch-dot sits. */}
        <line
          x1="11.5" y1="13.2" x2="26" y2="26"
          stroke={color} strokeWidth={stroke * 1.15} strokeLinecap="round"
          className={animated ? "k-sweep" : undefined}
          style={animated ? { transformOrigin: "20px 20px" } : undefined}
        />

        {/* Hub — the agent's pivot point */}
        <circle cx="20" cy="20" r={stroke * 0.9} fill={color} />

        {/* Catch-dot — moment of catching a discrepancy */}
        <circle cx="26" cy="26" r={stroke * 1.05} fill={color} />
        <circle cx="26" cy="26" r={stroke * 2.2} fill="none" stroke={color} strokeWidth={stroke * 0.4} opacity="0.5" />
      </g>
    </svg>
  );
}

const HandNote = memo(function HandNote({ children, color = C.amberInk, rotate = -2, size = 18, delay = 0, style }) {
  const computedStyle = useMemo(() => ({
    "--r": `${rotate}deg`,
    fontFamily: "'Caveat', cursive",
    color, fontSize: size, lineHeight: 1.15,
    animationDelay: `${delay}s`,
    display: "inline-block", whiteSpace: "nowrap",
    ...(style || {}),
  }), []);
  return <span className="k-hand k-hand-anim" style={computedStyle}>{children}</span>;
});

// ─────────────────────────────────────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────────────────────────────────────
const MERCHANT = { name: "Verdant Botanicals", tier: "Skincare · DTC · $24M revenue" };

// Agent-feed copy. Voice rules:
//   • Plain, calm, professional. First-person verbs.
//   • Translate jargon ("DIM" → "dimensional weight", "MBG" → "money-back
//     guarantee"). A first-time reader should understand each entry in one read.
//   • Complete sentences with periods. No fragments, no exclamations, no emoji.
//   • 12–18 words on average, hard ceiling 24.
//   • `stage` is a LIFECYCLE.key — drives the dot color in the rail.

// ─── LifecycleStrip — horizontal stage strip with shipment counts ───
// Used at the top of Overview. Compact: short label + count + connector line.
const LifecycleStrip = memo(function LifecycleStrip({ counts, activeKey, onPick }) {
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: `repeat(7, minmax(0, 1fr))`,
      background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12,
      padding: "14px 6px", gap: 0, position: "relative",
      minWidth: 0, overflow: "hidden",
    }}>
      {LIFECYCLE.map((s, i) => {
        const n = counts?.[s.key] ?? 0;
        const isActive = activeKey === s.key;
        const isLast = i === LIFECYCLE.length - 1;
        return (
          <div key={s.key} style={{ position: "relative", padding: "0 8px", display: "flex", flexDirection: "column", gap: 8, minWidth: 0 }}>
            {/* connector line to next stage */}
            {!isLast && (
              <div style={{
                position: "absolute", top: 12, right: 0, width: 16,
                height: 1, background: `linear-gradient(to right, ${s.color}55, ${LIFECYCLE[i+1].color}55)`,
                transform: "translateX(50%)", pointerEvents: "none", opacity: 0.4,
              }} />
            )}
            <button onClick={() => onPick && onPick(s.key)} style={{
              background: "transparent", border: "none", padding: 0, cursor: onPick ? "pointer" : "default",
              textAlign: "left", color: "inherit", display: "flex", flexDirection: "column", gap: 6,
              minWidth: 0,
            }}>
              <div className="flex items-center" style={{ gap: 6, minWidth: 0 }}>
                <div style={{
                  width: 22, height: 22, borderRadius: 999,
                  background: isActive ? s.color : `${s.color}22`,
                  color: isActive ? C.bg : s.color,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 10, fontWeight: 700, fontFamily: "var(--font-mono)",
                  border: `1px solid ${s.color}55`, flexShrink: 0,
                }}>{s.id}</div>
                <span className="k-mono" style={{
                  fontSize: 9, color: isActive ? s.color : C.textMuted,
                  letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 700,
                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", minWidth: 0,
                }}>{s.short}</span>
              </div>
              <div className="flex items-baseline" style={{ gap: 4, minWidth: 0 }}>
                <span className="k-display" style={{ fontSize: 20, color: n > 0 ? C.text : C.textMuted, lineHeight: 1 }}>{n}</span>
                <span className="k-mono" style={{ fontSize: 8, color: C.textMuted, letterSpacing: "0.06em" }}>shipments</span>
              </div>
            </button>
          </div>
        );
      })}
    </div>
  );
});

// ─── LifecycleMini — horizontal compact strip showing one shipment's path ───
// Used in filing detail header. Shows where in the lifecycle the dispute sits.
const LifecycleMini = memo(function LifecycleMini({ activeKey, completedKeys = [] }) {
  const completed = new Set(completedKeys);
  return (
    <div className="flex items-center" style={{ gap: 0, flexWrap: "wrap" }}>
      {LIFECYCLE.map((s, i) => {
        const isActive = activeKey === s.key;
        const isDone = completed.has(s.key);
        const isPast = isDone || (LIFECYCLE.findIndex(x => x.key === activeKey) > i);
        const dotColor = isActive ? s.color : isPast ? `${s.color}aa` : C.borderBright;
        return (
          <React.Fragment key={s.key}>
            <div className="flex items-center" style={{ gap: 6, opacity: isActive || isPast ? 1 : 0.5 }}>
              <div style={{
                width: 14, height: 14, borderRadius: 999,
                background: isActive ? s.color : "transparent",
                border: `1.5px solid ${dotColor}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 8, fontWeight: 700, color: isActive ? C.bg : dotColor,
                fontFamily: "var(--font-mono)",
              }}>{isPast && !isActive ? "✓" : s.id}</div>
              <span className="k-mono" style={{
                fontSize: 9, color: isActive ? s.color : isPast ? C.textSec : C.textMuted,
                letterSpacing: "0.1em", textTransform: "uppercase",
                fontWeight: isActive ? 700 : 500,
              }}>{s.short}</span>
            </div>
            {i < LIFECYCLE.length - 1 && (
              <div style={{ width: 14, height: 1, background: C.borderBright, margin: "0 8px", opacity: 0.5 }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
});

// ActingOnRail — peripheral activity panel on Overview.
// Lives in the right margin: a quiet, slow-moving column the user can glance at
// without losing focus on the inbox. Refreshes only when the agent actually
// completes something (~25–60s in real terms).
// ─────────────────────────────────────────────────────────────────────────────
// One column of readable sentences in the agent's voice. Layout per row:
//   [colored dot]  [relative time]  [single sentence]
// The newest entry pulses; its row carries an amber left border that fades
// after ~3s via CSS transition. Timestamps re-render every 30s.
// ─────────────────────────────────────────────────────────────────────────────

// Render a unix-ms timestamp as a short relative string ("now", "3m", "1h").
function relTime(createdAt, nowMs) {
  const sec = Math.max(0, Math.floor((nowMs - createdAt) / 1000));
  if (sec < 45) return "now";
  const min = Math.round(sec / 60);
  if (min < 60) return `${min}m`;
  const hr = Math.round(min / 60);
  if (hr < 24) return `${hr}h`;
  return `${Math.round(hr / 24)}d`;
}

// Same timestamp, formatted as 12h clock for the hover tooltip.
function absTime(createdAt) {
  const d = new Date(createdAt);
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? "pm" : "am";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, "0")}${ampm}`;
}

// DOSSIERS VIEW — agent-native ledger
//
// Every shipment becomes a dossier — the dashboard is the file cabinet, not a
// curated highlight reel. Dense rows grouped by state, with inline expand
// for a quick read of the evidence trail. The full timeline overlay is still
// reachable via "open full dossier" from the expanded row.
// ─────────────────────────────────────────────────────────────────────────────

// Synthetic ledger — pads the hand-curated DOSSIERS list with realistic
// "boring" rows so the file-cabinet feel is honest. Most shipments are
// uneventful; the few that aren't are why the dossier is there.
const FILLER_DOSSIERS = (() => {
  const carriers = ["UPS", "FedEx", "USPS", "UPS", "UPS", "FedEx"];
  const wts = [0.9, 1.4, 2.1, 3.6, 0.7, 1.8, 5.2, 0.6, 2.8];
  const dims = ["8×6×4", "10×8×6", "12×10×8", "14×10×4", "9×9×9", "6×4×3"];
  const states = ["watching", "in_transit", "watching", "in_transit", "in_transit", "reclaimed"];
  const notes = [
    "clean. no anomalies.",
    "watching for departure scan.",
    "small one. nothing yet.",
    "manifest matches. just waiting.",
    "fee logic looks normal.",
    null, null,
  ];
  const out = [];
  for (let i = 0; i < 18; i++) {
    const id = `VB-${44250 - i * 3}`;
    const carrier = carriers[i % carriers.length];
    const state = states[i % states.length];
    const reclaimed = state === "reclaimed";
    out.push({
      id, carrier, state,
      evidence: [
        { label: "manifest captured", time: `${(i % 9) + 1}d ago`, done: true },
        { label: `dimensions logged · ${dims[i % dims.length]}`, time: `${(i % 9) + 1}d ago`, done: true },
        { label: `weight · ${wts[i % wts.length]} lb`, time: `${(i % 9) + 1}d ago`, done: true },
        ...(reclaimed
          ? [{ label: "credit confirmed", time: "this week", done: true, ours: true }]
          : state === "watching"
            ? [{ label: "awaiting departure scan", time: "—", done: false, pending: true }]
            : [{ label: "in transit", time: "—", done: false, pending: true }]),
      ],
      note: notes[i % notes.length], noteRotate: ((i % 5) - 2),
      amount: reclaimed ? +(3 + (i % 7) * 1.4).toFixed(2) : null,
      filler: true,
    });
  }
  return out;
})();

const ALL_DOSSIERS = [...DOSSIERS, ...FILLER_DOSSIERS];

const LEDGER_GROUPS = [
  { k: "active",  l: "active · evidence-watching", states: ["watching", "in_transit"] },
  { k: "flagged", l: "flagged · discrepancy or filing", states: ["invoiced", "filing"] },
  { k: "closed",  l: "closed · reclaimed", states: ["reclaimed"] },
];

function DossiersView({ openDossier }) {
  const [q, setQ] = useState("");
  const [carrierFilter, setCarrierFilter] = useState("all");
  const [expanded, setExpanded] = useState(null);

  const matching = useMemo(() => {
    const needle = q.trim().toLowerCase();
    return ALL_DOSSIERS.filter(d => {
      if (carrierFilter !== "all" && d.carrier !== carrierFilter) return false;
      if (!needle) return true;
      if (d.id.toLowerCase().includes(needle)) return true;
      if (d.carrier.toLowerCase().includes(needle)) return true;
      if (d.state.includes(needle)) return true;
      return d.evidence.some(e => e.label.toLowerCase().includes(needle));
    });
  }, [q, carrierFilter]);

  const grouped = LEDGER_GROUPS.map(g => ({
    ...g,
    rows: matching.filter(d => g.states.includes(d.state)),
  })).filter(g => g.rows.length > 0);

  const counts = {
    total: ALL_DOSSIERS.length,
    active: ALL_DOSSIERS.filter(d => ["watching", "in_transit"].includes(d.state)).length,
    flagged: ALL_DOSSIERS.filter(d => ["invoiced", "filing"].includes(d.state)).length,

// One-of-many evidence step — rendered as a tiny chip in the row preview.
// Lifecycle stages mapped to chip positions (Change 5).
// Tick i ↔ LIFECYCLE[i].key. The first 3 are mint (label/pickup/transit),
// tick 4 (invoice) is red but only fills once the invoice has landed,
// 5+ are filed/pushback/paid.
const TICK_STAGES = ["label", "pickup", "transit", "invoice", "filed", "pushback", "paid"];
const TICK_STATUS_BY_DOSSIER_STATE = {
  watching:   ["captured", "pending",  "pending",  "pending",  "pending", "pending", "pending"],
  in_transit: ["captured", "sealed",   "following","pending",  "pending", "pending", "pending"],
  invoiced:   ["captured", "sealed",   "followed", "landed",   "pending", "pending", "pending"],
  filing:     ["captured", "sealed",   "followed", "caught",   "filed",   "pending", "pending"],
  reclaimed:  ["captured", "sealed",   "followed", "caught",   "filed",   "—",       "reclaimed"],
};

function EvidenceChip({ ev, position = 0, dossierState }) {
  const stageKey = TICK_STAGES[position];
  const stage = STAGE_BY_KEY[stageKey];
  const statusList = TICK_STATUS_BY_DOSSIER_STATE[dossierState] || [];
  const status = statusList[position] || (ev.pending ? "pending" : "captured");
  const isPending = status === "pending" || ev.pending;

  // Color by lifecycle stage; pending ticks fade to muted.
  const tone = isPending ? C.textMuted : (stage ? stage.color : (ev.flag ? C.red : C.mint));
  const bg = isPending
    ? "rgba(168,160,149,0.06)"
    : `${tone}1a`;
  const glyph = isPending ? "⋯" : ev.flag ? "!" : ev.ours ? "✦" : "✓";
  const titleStage = stage ? stage.short : "Evidence";
  return (
    <span
      title={`${titleStage} · ${status}`}
      style={{
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        width: 16, height: 16, borderRadius: 4, background: bg,
        border: `1px solid ${tone}40`, fontSize: 10, color: tone,
        fontFamily: "JetBrains Mono, monospace", fontWeight: 700, flexShrink: 0,
      }}
    >
      {glyph}
    </span>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// RECURRING LEAKS VIEW — plain-language report of money slipping out the same way
// every week. Built for a layman to scan in 10 seconds:
//   - what's leaking (one sentence, no jargon)
//   - what it's costing (big $, count of shipments)
//   - what to do (one button, or "already handled")
// No filters, no list/detail split, no severity codes, no charts. Just leaks.
// ─────────────────────────────────────────────────────────────────────────────

// Plain-language rewrite of PATTERNS_INIT, optimized for a non-ops reader.
// Each leak has: what (single-sentence explanation), why (one line of cause),
// fix (a specific action they can take in their tools, separate from filing).
const LEAK_COPY = {
  p1: {
    what: "UPS is overcharging you for package weight every Tuesday.",
    why: "The Tuesday morning warehouse shift is using a different scale that reads heavy. UPS bills based on whichever is bigger — actual or dimensional — so we're getting hit on every Tuesday outbound.",
    fix: "Recalibrate the Tuesday scale at dock 2.",
    fixWhere: "Warehouse · dock 2",
  },
  p2: {
    what: "FedEx is treating 11 of your business addresses as homes.",
    why: "Your ShipStation address book is missing the commercial flag on these. FedEx defaults to residential and adds a $4.30 surcharge each.",
    fix: "Mark these 11 addresses as commercial in ShipStation.",
    fixWhere: "ShipStation · address rules",
  },
  p3: {
    what: "UPS billed 7 packages at zone 7 when they actually shipped to zone 5.",
    why: "Their system mis-assigned the destination zone. We have GPS confirmation on every one.",
    fix: "Nothing to fix on your end — already filed.",
    fixWhere: null,
  },
  p4: {
    what: "FedEx Express missed its guaranteed delivery on 8 shipments.",
    why: "Their money-back guarantee says they refund the full shipping cost if they miss the deadline. We caught all 8.",
    fix: "Money's already back. Just keep an eye on the FedEx Express lane this month.",
    fixWhere: null,
  },
  p5: {
    what: "UPS double-billed the fuel surcharge on 3 invoices.",
    why: "Once at base rate, then again as an adjustment. Probably a bug on their end.",
    fix: "Filing this morning. No action from you.",
    fixWhere: null,
  },
  p6: {
    what: "UPS is paying back less than klemr filed for — but only on DIM-weight disputes.",
    why: "Nine credits this month came back $4–12 short of the original claim. The dispute is being honored, then discounted at posting. Pattern is too clean to be noise.",
    fix: "Klemr is re-filing each delta with the original evidence packet. Nothing for you to do — but worth knowing UPS is doing this.",
    fixWhere: null,
  },
};

function PatternsView() {
  const [patterns, setPatterns] = useState(PATTERNS_INIT);

  const totals = {
    leaking: patterns.filter(p => p.state === "actionable").reduce((s, p) => s + p.estimated, 0),
    inflight: patterns.filter(p => p.state === "filed").reduce((s, p) => s + p.estimated, 0),
    reclaimed: patterns.filter(p => p.state === "reclaimed").reduce((s, p) => s + p.estimated, 0),
  };
  const totalLeakingCount = patterns.filter(p => p.state === "actionable").length;

  const fileNow = (id) => {
    setPatterns(ps => ps.map(p => p.id === id
      ? { ...p, state: "filed", age: "filed just now", note: "filed. carriers reply 3-7 business days." }
      : p));
  };

  // Sort: leaking now first (biggest $), then in-flight, then reclaimed
  const stateOrder = { actionable: 0, filed: 1, reclaimed: 2 };
  const sorted = [...patterns].sort((a, b) => {
    if (stateOrder[a.state] !== stateOrder[b.state]) return stateOrder[a.state] - stateOrder[b.state];
    return b.estimated - a.estimated;
  });

  return (
    <div style={{ padding: "32px 32px 64px", display: "flex", flexDirection: "column", gap: 28, maxWidth: 920, margin: "0 auto", width: "100%" }}>
      {/* Plain-language summary at top — answers "should I be worried?" */}
      <div style={{
        background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12,
        padding: "22px 26px",
      }}>
        <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 10 }}>
          the short version
        </div>
        <div className="k-display" style={{ fontSize: 22, color: C.text, lineHeight: 1.35, fontWeight: 400, letterSpacing: "-0.01em" }}>
          {totalLeakingCount > 0 ? (
            <>You're leaking about <span style={{ color: C.red }}>${fmt$(totals.leaking)}</span>/month from <span style={{ color: C.text, fontWeight: 500 }}>{totalLeakingCount} recurring issues</span>. Klemr's already flagged them — just pick what to do below.</>
          ) : (
            <>No active leaks right now. Klemr's watching.</>
          )}
        </div>
        <div className="flex items-center" style={{ gap: 24, marginTop: 18, flexWrap: "wrap" }}>
          <div>
            <div className="k-display" style={{ fontSize: 26, color: C.red, lineHeight: 1 }}>${fmt$(totals.leaking)}</div>
            <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4 }}>leaking now</div>
          </div>
          <div style={{ width: 1, height: 32, background: C.border }} />
          <div>
            <div className="k-display" style={{ fontSize: 26, color: C.blue, lineHeight: 1 }}>${fmt$(totals.inflight)}</div>
            <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4 }}>filed, waiting</div>
          </div>
          <div style={{ width: 1, height: 32, background: C.border }} />
          <div>
            <div className="k-display" style={{ fontSize: 26, color: C.amber, lineHeight: 1 }}>${fmt$(totals.reclaimed)}</div>
            <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4 }}>got back</div>
          </div>
        </div>
      </div>

      {/* The leaks themselves — single column, big and readable */}
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {sorted.map((p, i) => (
          <LeakCard key={p.id} p={p} index={i} onFile={() => fileNow(p.id)} />
        ))}
      </div>

      {/* Footer reassurance */}
      <div className="flex items-center" style={{ gap: 10, padding: "12px 16px", justifyContent: "center" }}>
        <Icon.Pulse size={11} color={C.mint} />
        <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.06em" }}>
          klemr keeps watching. new leaks show up here automatically.
        </span>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// FILINGS VIEW — every claim the agent has submitted, with replayable recordings.
//
// Filter buckets (single dimension, mutually exclusive):
//   all       — everything
//   current   — actively at the carrier (filing now + at carrier)            ← default
//   scheduled — queued, waiting on something (evidence / your approval)
//   past      — terminal outcomes known (won / denied / short-pay)
//   won       — past, paid out
//   denied    — past, carrier refused (and we're NOT re-filing)
//   appealed  — denied, but klemr filed an appeal that's now in flight
//
// "needs you" lives at the TOP as a strip when count > 0; it's the same items
// as Overview's i-need-you inbox, just in the filings context.
// ─────────────────────────────────────────────────────────────────────────────
function FilingsView({ openDossier, setView }) {
  // Default to "current" — what's happening right now is what matters first.
  const [filter, setFilter] = useState("current");
  const [selected, setSelected] = useState("F-3318");

  const buckets = {
    all:       (f) => true,
    current:   (f) => f.status === "filing" || f.status === "awaiting",
    scheduled: (f) => f.status === "preparing",
    past:      (f) => f.status === "won" || f.status === "denied" || f.status === "shortpay",
    won:       (f) => f.status === "won",
    denied:    (f) => f.status === "denied",
    appealed:  (f) => f.status === "appealed",
  };
  const filtered = useMemo(() => FILINGS.filter(buckets[filter] || buckets.all), [filter]);

  // Counts shown next to filter chips
  const counts = useMemo(() => {
    const c = {};
    for (const k of Object.keys(buckets)) c[k] = FILINGS.filter(buckets[k]).length;
    return c;
  }, []);

  // Auto-fall-back to first match if current selection filtered out
  useEffect(() => {
    if (!filtered.find(f => f.id === selected) && filtered.length) setSelected(filtered[0].id);
  }, [filter]);

  const sel = FILINGS.find(f => f.id === selected) || FILINGS[0];

  // Money-first stats. The questions a user actually walks in with:
  //   "did money come in?", "what's still out there?", "anything stuck?"
  const totals = useMemo(() => ({
    won:        FILINGS.filter(f => f.status === "won").reduce((s, f) => s + f.amount, 0),
    inFlight:   FILINGS.filter(f => f.status === "filing" || f.status === "awaiting" || f.status === "appealed").reduce((s, f) => s + f.amount, 0),
    inFlightN:  FILINGS.filter(f => f.status === "filing" || f.status === "awaiting" || f.status === "appealed").length,
    needs:      FILINGS.filter(f => f.needsHuman).length,
    liveNow:    FILINGS.filter(f => f.status === "filing").length,
  }), []);

  // Filing items that mirror Overview's "i need you" cards. Same inboxId on
  // both sides keeps them aligned so the user sees the SAME thing in both
  // places — we just present the filing-side context here.
  const needsYouFilings = FILINGS.filter(f => f.needsHuman);

  const FILTER_CHIPS = [
    { k: "all",       l: "all" },
    { k: "current",   l: "current" },
    { k: "scheduled", l: "scheduled" },
    { k: "past",      l: "past" },
    { k: "won",       l: "won" },
    { k: "denied",    l: "denied" },
    { k: "appealed",  l: "appealed" },
  ];

  return (
    <div style={{ padding: "24px 28px 32px", display: "flex", flexDirection: "column", gap: 16, maxWidth: 1500, height: "100%" }}>

      {/* HERO — the most recent recording. This is where the eye lands.
          Big, full-width, the browser/scrubber/commentary all visible at once.
          Everything else on this page is secondary to "what is klemr filing
          right now". */}
      <section style={{
        background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 12,
        overflow: "hidden", display: "flex", flexDirection: "column", flex: "0 0 auto",
      }}>
        <div className="flex items-center" style={{ gap: 10, padding: "10px 18px", borderBottom: `1px solid ${C.border}`, background: C.bgElevated }}>
          <span className="k-mono" style={{ fontSize: 9, color: sel.status === "filing" ? C.red : C.amberInk, letterSpacing: "0.2em", textTransform: "uppercase", fontWeight: 700 }}>
            {sel.status === "filing" ? "▸ live recording" : "most recent recording"}
          </span>
          {sel.status === "filing" && (
            <span className="k-mono flex items-center" style={{ fontSize: 9, color: C.red, gap: 6, letterSpacing: "0.12em", textTransform: "uppercase" }}>
              <span className="k-pulse" style={{ width: 6, height: 6, borderRadius: 999, background: C.red }} />
              filing now
            </span>
          )}
          <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, marginLeft: "auto" }}>
            jump to a different filing below ↓
          </span>
        </div>
        <div className="k-scroll" style={{ overflowY: "auto", maxHeight: "min(78vh, 920px)" }}>
          <FilingDetail key={sel.id} f={sel} openDossier={openDossier} setView={setView} />
        </div>
      </section>

      {/* All other filings — compact roster. The list of every filing,
          chips above for filtering. Quieter than the hero. */}
      <section style={{ display: "flex", flexDirection: "column", gap: 10, minHeight: 0, flex: "1 1 auto" }}>
        {/* Money strip + filter chips, both quiet, on one row */}
        <div className="flex items-center" style={{ gap: 14, flexWrap: "wrap" }}>
          <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase", fontWeight: 700 }}>
            all filings
          </span>
          <span className="k-mono" style={{ fontSize: 10, color: C.amber }}>
            ${fmt$(totals.won)} <span style={{ color: C.textMuted }}>recovered</span>
          </span>
          <span className="k-mono" style={{ fontSize: 10, color: C.blue }}>
            ${fmt$(totals.inFlight)} <span style={{ color: C.textMuted }}>in flight · {totals.inFlightN}</span>
          </span>
          {totals.needs > 0 && (
            <span className="k-mono" style={{ fontSize: 10, color: C.amberInk }}>
              {totals.needs} <span style={{ color: C.textMuted }}>need{totals.needs === 1 ? "s" : ""} you</span>
            </span>
          )}
          <span style={{ flex: 1 }} />
          <div className="flex items-center" style={{ gap: 4, flexWrap: "wrap" }}>
            {FILTER_CHIPS.map(f => (
              <button key={f.k} onClick={() => setFilter(f.k)} className="k-mono" style={{
                fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", padding: "4px 10px",
                borderRadius: 4, cursor: "pointer", border: `1px solid ${filter === f.k ? C.amber : C.border}`, fontWeight: 600,
                background: filter === f.k ? C.amber : "transparent",
                color: filter === f.k ? C.bg : C.textSec,
              }}>{f.l} <span style={{ opacity: 0.6, marginLeft: 3 }}>{counts[f.k]}</span></button>
            ))}
          </div>
        </div>

        {/* Filings roster — single column of compact rows. Click to swap into the hero above. */}
        <div style={{ background: C.bgCard, border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", display: "flex", flexDirection: "column", minHeight: 0 }}>
          <div className="k-scroll" style={{ overflowY: "auto" }}>
            {filtered.map(f => (
              <FilingRow key={f.id} f={f} active={f.id === selected} onClick={() => {
                setSelected(f.id);
                // Scroll hero into view so the click feels effective
                if (typeof window !== "undefined") {
                  setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);
                }
              }} />
            ))}
            {filtered.length === 0 && (
              <div className="k-mono" style={{ padding: "22px 18px", color: C.textMuted, fontSize: 11, textAlign: "center" }}>
                no filings match this filter.
              </div>
            )}
          </div>
        </div>
      </section>
    </div>
  );
}

      <div className="flex items-center justify-between">

}, (p, n) => p.f.id === n.f.id && p.active === n.active);

// ─── Per-status user actions for a filing ───
const FilingActions = memo(function FilingActions({ f, setView }) {
  const [toast, setToast] = useState(null);
  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1600); };
  const copyRef = () => {
    const ref = `KLM-${f.id}-${f.carrier.replace(/\s+/g, "").toUpperCase().slice(0,4)}`;
    if (navigator.clipboard) navigator.clipboard.writeText(ref).catch(() => {});
    flash(`copied ${ref}`);
  };
  const exportProof = () => flash(`exported pdf · ${f.id}`);
  const reconcile  = () => flash(`marked reconciled`);
  const approveNext= () => flash(`approved next move`);
  const reFile     = () => flash(`re-file queued`);
  const escalate   = () => flash(`escalated to human`);

  // Pick actions by status
  let actions = [];
  if (f.status === "filing")    actions = [["approve next", approveNext, "primary"], ["pause auto", () => flash("paused"), "ghost"]];
  else if (f.status === "won")  actions = [["mark reconciled", reconcile, f.paidAmount ? "ghost" : "primary"], ["export proof", exportProof, "ghost"]];
  else if (f.status === "denied") actions = [["re-file", reFile, "primary"], ["escalate", escalate, "ghost"]];
  else if (f.status === "queued") actions = [["release now", () => flash("released"), "primary"], ["hold", () => flash("held"), "ghost"]];

  return (
    <>
      {actions.map(([label, fn, kind]) => (
        <button key={label} onClick={fn} className={`k-btn ${kind === "primary" ? "k-btn-primary" : "k-btn-ghost"}`} style={{ fontSize: 11, padding: "6px 12px" }}>
          {label}
        </button>
      ))}
      <button onClick={copyRef} className="k-btn k-btn-ghost" style={{ fontSize: 11, padding: "6px 10px" }} title="copy reference number">
        <Icon.Copy size={11} color="currentColor" />
      </button>
      {toast && (
        <span className="k-mono" style={{ fontSize: 9, color: C.green, letterSpacing: "0.12em", textTransform: "uppercase", marginLeft: 4 }}>
          ✓ {toast}
        </span>
      )}
    </>
  );
});

// ─── Filing detail / recording player ───
function FilingDetail({ f, openDossier, setView }) {
  // Playback state
  const [playing, setPlaying] = useState(f.status === "filing");
  const [t, setT] = useState(f.status === "filing" ? f.recording.currentSec : 0);
  const dur = f.recording.durationSec;

  // Reset on selection change
  useEffect(() => {
    setT(f.status === "filing" ? f.recording.currentSec : 0);
    setPlaying(f.status === "filing");
  }, [f.id]);

  // Tick when playing
  useEffect(() => {
    if (!playing || dur === 0) return;
    const id = setInterval(() => {
      setT(cur => {
        if (cur >= dur) { setPlaying(false); return dur; }
        return Math.min(dur, cur + 0.25);
      });
    }, 110);
    return () => clearInterval(id);
  }, [playing, dur]);

  const meta = STATUS_META[f.status];
  const tmeta = FILING_TYPE_META[f.filingType];
  const portal = CARRIER_PORTAL[f.carrier] || { host: f.carrier.toLowerCase() + ".com", page: "/dispute" };

  // Find current step (last whose t <= current playhead)
  const currentStep = useMemo(() => {
    let cur = f.recording.steps[0];
    for (const s of f.recording.steps) if (s.t <= t) cur = s;
    return cur;
  }, [t, f]);
  const currentIdx = f.recording.steps.indexOf(currentStep);

  const reset = () => { setT(0); setPlaying(true); };

  return (
    <div style={{ display: "flex", flexDirection: "column" }}>

      {/* Header */}
      <div style={{ padding: "20px 24px 14px", borderBottom: `1px solid ${C.border}` }}>
        <div className="flex items-center" style={{ gap: 10, marginBottom: 10 }}>
          <div style={{ padding: "4px 10px", borderRadius: 4, background: `${meta.color}1A`, border: `1px solid ${meta.color}50`, display: "inline-flex", alignItems: "center", gap: 6 }}>
            <div className={f.status === "filing" ? "k-pulse" : ""} style={{ width: 6, height: 6, borderRadius: 999, background: meta.dot }} />
            <span className="k-mono" style={{ fontSize: 9, color: meta.color, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 700 }}>{meta.label}</span>
          </div>
          <span className="k-mono" style={{ fontSize: 9, color: tmeta.color, letterSpacing: "0.12em", textTransform: "uppercase" }}>{tmeta.label}</span>
          <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, marginLeft: "auto" }}>filed {f.filedAt || "—"} · {f.carrier}</span>
        </div>
        <div className="flex items-center" style={{ gap: 14 }}>
          <h2 className="k-display" style={{ fontSize: 26, color: C.text, lineHeight: 1.1, margin: 0, whiteSpace: "nowrap", flexShrink: 0 }}>#{f.id}</h2>
          <span style={{ fontSize: 13, color: C.textSec, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.lane}</span>
          <div style={{ marginLeft: "auto", flexShrink: 0, textAlign: "right" }}>
            <span className="k-display" style={{ fontSize: 28, color: f.status === "won" ? C.amber : f.status === "denied" ? C.textMuted : C.text, textDecoration: f.status === "denied" ? "line-through" : "none" }}>
              {f.status === "won" ? "+" : ""}${fmt$(f.amount)}
            </span>
            {f.paidAmount != null && (
              <div className="k-mono" style={{ fontSize: 9, color: C.amberInk, textAlign: "right", marginTop: 2 }}>· ${fmt$(f.paidAmount)} paid</div>
            )}
          </div>
        </div>
        <div className="flex items-center" style={{ gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          {/* CROSS-LINKS — dossier, parent recurring leak, prior filing if appealed */}
          <button onClick={() => openDossier && openDossier(DOSSIERS.find(d => d.id === f.dossierId))} disabled={!DOSSIERS.find(d => d.id === f.dossierId)} className="k-btn k-btn-ghost" style={{ fontSize: 11, padding: "6px 12px", opacity: DOSSIERS.find(d => d.id === f.dossierId) ? 1 : 0.4 }}>
            <Icon.Dossier size={11} color="currentColor" /> &nbsp; dossier #{f.dossierId}
          </button>
          {f.leakId && (
            <button onClick={() => setView && setView("patterns")} className="k-btn k-btn-ghost" style={{ fontSize: 11, padding: "6px 12px" }} title="this filing is part of a recurring leak">
              <Icon.Pattern size={11} color="currentColor" /> &nbsp; recurring leak
            </button>
          )}
          {f.priorFiling && (
            <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.1em", textTransform: "uppercase" }}>
              re-file of <span style={{ color: C.violet }}>#{f.priorFiling}</span>
            </span>
          )}
          {f.status === "filing" && (
            <span className="k-mono flex items-center" style={{ fontSize: 9, color: C.red, gap: 6, letterSpacing: "0.12em", textTransform: "uppercase" }}>
              <span className="k-pulse" style={{ width: 7, height: 7, borderRadius: 999, background: C.red }} />
              recording in progress
            </span>
          )}

          {/* USER ACTIONS — what would you DO with this filing? Status-dependent. */}
          <div className="flex items-center" style={{ gap: 6, marginLeft: "auto", flexWrap: "wrap" }}>
            <FilingActions f={f} setView={setView} />
          </div>
        </div>
      </div>

      {/* Lifecycle mini-strip — where in the 7-stage journey this filing sits.
          Filings always live at stage 5 (filed) or 6 (pushback if denied/appealed). */}
      <div style={{ padding: "12px 24px", background: "rgba(0,0,0,0.18)", borderBottom: `1px solid ${C.border}` }}>
        <div className="flex items-center" style={{ gap: 10, marginBottom: 8 }}>
          <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase" }}>shipment journey</span>
          <span className="k-mono" style={{ fontSize: 9, color: C.textMuted }}>· dossier #{f.dossierId}</span>
        </div>
        <LifecycleMini
          completedKeys={["label","pickup","transit","invoice"]}
          activeKey={f.status === "won" ? "paid" : (f.status === "denied" || f.status === "appealed") ? "pushback" : "filed"}
        />
      </div>

      {/* Browser frame */}
      <div style={{ padding: "18px 24px 0" }}>
        {/* Stage narration caption (Change 6) — agent voice describing where this filing sits */}
        <div style={{
          fontFamily: "var(--font-display)", fontStyle: "italic",
          fontSize: 18, color: C.amberInk, lineHeight: 1.4,
          marginBottom: 12, maxWidth: 720,
        }}>
          — {(() => {
            const stage = f.status === "won" ? "paid"
              : (f.status === "denied" || f.status === "appealed") ? "pushback"
              : "filed";
            return ({
              label:    "i opened the dossier when you printed the label.",
              pickup:   "evidence is sealed. the carrier has it now.",
              transit:  "i'm following every scan. weather is being pulled.",
              invoice:  "the bill landed. i'm checking every line.",
              filed:    "i filed it. ups got it. usually 6–14 days to hear back.",
              pushback: "they pushed back. i'm countering with stronger evidence.",
              paid:     "credit posted. i reconciled it to the dollar.",
            })[stage];
          })()}
        </div>
        <BrowserRecording f={f} t={t} step={currentStep} stepIdx={currentIdx} portal={portal} />
      </div>

      {/* Scrubber */}
      <div style={{ padding: "14px 24px 8px" }}>
        <Scrubber f={f} t={t} setT={setT} dur={dur} playing={playing} setPlaying={setPlaying} reset={reset} />
      </div>

      {/* Step list + commentary */}
      <div style={{ padding: "8px 24px 20px", display: "grid", gridTemplateColumns: "1.05fr 1fr", gap: 18 }}>
        <StepList f={f} currentIdx={currentIdx} t={t} onJump={(stepT) => { setT(stepT); setPlaying(false); }} />
        <CommentaryPane f={f} step={currentStep} stepIdx={currentIdx} />
      </div>

      {/* Evidence packet — the actual artifacts klemr uploads to the carrier */}
      <EvidencePacket f={f} />

      {/* Carrier response */}
      {f.response && (
        <div style={{ padding: "0 24px 24px" }}>
          <CarrierResponse f={f} />
        </div>
      )}
    </div>
  );
}

// ─── Scrubber: timeline with action markers + transport controls ───
function Scrubber({ f, t, setT, dur, playing, setPlaying, reset }) {
  if (dur === 0) {
    return (
      <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", display: "flex", alignItems: "center", gap: 10 }}>
        <Icon.Pause size={11} color={C.textMuted} />
        <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.08em" }}>recording will start when filing begins · {f.recording.steps[0]?.detail || ""}</span>
      </div>
    );
  }
  const pct = dur === 0 ? 0 : (t / dur) * 100;
  const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(Math.floor(s % 60)).padStart(2, "0")}`;
  return (
    <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px" }}>
      <div className="flex items-center" style={{ gap: 12 }}>
        <button onClick={() => setPlaying(p => !p)} style={{
          width: 28, height: 28, borderRadius: 999, background: C.amber, color: C.bg,
          border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
        }} title={playing ? "pause" : "play"}>
          {playing ? <Icon.Pause size={11} color={C.bg} /> : <Icon.Play size={11} color={C.bg} />}
        </button>
        <button onClick={reset} style={{
          width: 24, height: 24, borderRadius: 999, background: "transparent", color: C.textSec,
          border: `1px solid ${C.border}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
        }} title="restart">
          <Icon.Refresh size={10} color="currentColor" />
        </button>

        {/* Timeline */}
        <div
          onClick={(e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            setT(ratio * dur);
            setPlaying(false);
          }}
          style={{
            flex: 1, height: 28, background: "#0A0907", border: `1px solid ${C.border}`,
            borderRadius: 4, position: "relative", cursor: "pointer",
          }}>
          {/* Played portion */}
          <div style={{
            position: "absolute", left: 0, top: 0, bottom: 0,
            width: `${pct}%`, background: `linear-gradient(90deg, ${C.amberDim}, ${C.amber})`,
            opacity: 0.35, transition: "width 0.1s linear",
          }} />
          {/* Step markers */}
          {f.recording.steps.map((s, i) => {
            const left = (s.t / dur) * 100;
            return (
              <div key={i} title={`${s.action} · ${s.target}`} style={{
                position: "absolute", left: `${left}%`, top: 4, bottom: 4, width: 2,
                background: s.action === "click" || s.action === "capture" ? C.amber : C.borderBright,
                opacity: s.t <= t ? 1 : 0.5,
              }} />
            );
          })}
          {/* Playhead */}
          <div style={{
            position: "absolute", left: `${pct}%`, top: -2, bottom: -2, width: 2,
            background: C.amberBright, boxShadow: `0 0 6px ${C.amber}`,
            transition: "left 0.1s linear",
          }} />
        </div>

        <span className="k-mono" style={{ fontSize: 10, color: C.textSec, letterSpacing: "0.06em", minWidth: 80, textAlign: "right" }}>
          {fmt(t)} <span style={{ color: C.textMuted }}>/ {fmt(dur)}</span>
        </span>
      </div>
    </div>
  );
}

// ─── Step list ───
function StepList({ f, currentIdx, t, onJump }) {

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>

// ─── Commentary pane (synced agent narration) ───
function CommentaryPane({ f, step, stepIdx }) {
  // Find the most recent step with a non-empty `say`
  const speaking = useMemo(() => {
    for (let i = stepIdx; i >= 0; i--) {
      const s = f.recording.steps[i];
      if (s && s.say) return { s, idx: i };
    }
    return null;
  }, [stepIdx, f]);

  return (
    <div style={{
      display: "flex", flexDirection: "column", gap: 8, alignSelf: "flex-start",
      position: "sticky", top: 8,
    }}>
      <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.14em", textTransform: "uppercase" }}>
        agent · narrating
      </div>
      <div style={{
        background: "rgba(247,185,85,0.04)", border: `1px dashed rgba(247,185,85,0.28)`,
        borderRadius: 10, padding: "16px 18px", minHeight: 110,
      }}>
        {speaking ? (
          <div key={speaking.idx} className="k-fade-in" style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <div className="flex items-center" style={{ gap: 8 }}>
              <KlemrSeal size={16} color={C.amber} />

                @ {String(Math.floor(speaking.s.t / 60)).padStart(2, "0")}:{String(speaking.s.t % 60).padStart(2, "0")}

  );
}

const Meta = memo(function Meta({ l, v }) {

// ─────────────────────────────────────────────────────────────────
// EvidencePacket — the manila folder klemr uploads to the carrier portal.
//
// Filings in copy promise an "evidence packet" — this makes it concrete.
// Each filingType gets a slightly different set of artifacts, all derived
// from the dossier:
//   DIM     — scale slip (claimed vs billed weight) + package photo
//   WEIGHT  — same as DIM
//   ZONE    — GPS confirmation + carrier's own zone tariff
//   GSR     — tracking history + NOAA weather pull
//   ADDR    — address verification (commercial vs residential flag)
//   DUP     — invoice line excerpt showing the duplicate charge
//
// Visual style: paper-on-tan, slightly tilted artifacts, typewriter labels.
// No real images — just SVG diagrams that read as receipts/photos. The
// point is "here's what the carrier sees," not pixel realism.
// ─────────────────────────────────────────────────────────────────

function EvidencePacket({ f }) {
  // Each filing type maps to a small set of artifacts. Keeping this in one
  // place makes it easy to add new types later.
  const artifacts = useMemo(() => {
    const t = f.filingType;
    if (t === "DIM" || t === "WEIGHT") {
      return [
        { kind: "scale",   tilt: -1.2, claimed: "2.3 lb", billed: "4.0 lb", at: "9:15a · dock 3" },
        { kind: "photo",   tilt:  1.6, caption: "package on scale · 9:15a", dims: "12 × 10 × 8" },
        { kind: "invoice", tilt: -0.6, line: "billed weight · 4.0 lb", carrier: f.carrier, ref: "INV-" + (44000 + (f.id?.charCodeAt(2) || 0) % 99) },
      ];
    }
    if (t === "ZONE") {
      return [
        { kind: "gps",     tilt: -1.4, claimed: "zone 5", billed: "zone 7", route: f.lane?.split("·")[0]?.trim() || "ORD" },
        { kind: "tariff",  tilt:  1.1, doc: f.carrier?.toLowerCase() + "-zones.pdf" },
        { kind: "invoice", tilt: -0.4, line: "billed zone · 7", carrier: f.carrier, ref: "INV-" + (44000 + (f.id?.charCodeAt(2) || 0) % 99) },
      ];
    }
    if (t === "GSR") {
      const lane = f.lane || "MEM hub";
      return [
        { kind: "tracking", tilt: -1.0, sla: "Wed 4:30p", actual: "Wed 6:14p", late: "1h 44m" },
        { kind: "weather",  tilt:  1.4, route: lane, finding: "clear · no waiver triggered" },
        { kind: "invoice",  tilt: -0.8, line: "service · express saver", carrier: f.carrier, ref: "AWB-789012345" },
      ];
    }
    if (t === "ADDR") {
      return [
        { kind: "address", tilt: -1.0, billed: "residential", actual: "commercial · suite 200" },
        { kind: "invoice", tilt:  1.0, line: "residential surcharge · $4.30", carrier: f.carrier, ref: "INV-" + (44000 + (f.id?.charCodeAt(2) || 0) % 99) },
      ];
    }
    if (t === "DUP") {
      return [
        { kind: "invoice2", tilt: -1.2, lines: [{ label: "fuel surcharge", amt: "$2.18" }, { label: "fuel surcharge (adj.)", amt: "$2.18" }] },
        { kind: "invoice", tilt: 1.0, line: "double-billed line item", carrier: f.carrier, ref: "INV-" + (44000 + (f.id?.charCodeAt(2) || 0) % 99) },
      ];
    }
    // Fallback
    return [
      { kind: "invoice", tilt: -0.6, line: "see filing detail", carrier: f.carrier, ref: f.id },
    ];
  }, [f.filingType, f.carrier, f.lane, f.id]);

  return (
    <section style={{ padding: "12px 24px 20px" }}>
      <div className="flex items-center" style={{ gap: 10, marginBottom: 12 }}>
        <Icon.Dossier size={11} color={C.amber} />
        <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase" }}>
          evidence packet
        </span>
        <span className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.04em" }}>
          · {artifacts.length} artifact{artifacts.length === 1 ? "" : "s"} · pulled from dossier #{f.dossierId} · attached to filing
        </span>
      </div>

      <div style={{
        display: "grid",
        gridTemplateColumns: `repeat(${artifacts.length}, 1fr)`,
        gap: 14,
      }}>
        {artifacts.map((a, i) => (
          <Artifact key={i} a={a} />
        ))}
      </div>

      <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.04em", marginTop: 12, opacity: 0.7 }}>
        ↳ all three were uploaded to the carrier portal in step <span style={{ color: C.amber }}>{f.recording.steps.findIndex(s => s.action === "upload") + 1 || "—"}</span> of the recording above.
      </div>
    </section>
  );
}

  const [followup, setFollowup] = useState(null);
  return (

      </div>

      {r.memo && <div style={{ fontSize: 12, color: C.textSec, lineHeight: 1.5 }}>{r.memo}</div>}
      {r.eta && <div className="k-mono" style={{ fontSize: 10, color: C.textMuted }}>eta · {r.eta}</div>}
      {r.reason && (
        <div style={{ background: "rgba(248,113,113,0.06)", border: `1px solid rgba(248,113,113,0.25)`, borderRadius: 6, padding: "10px 12px" }}>
          <div className="k-mono" style={{ fontSize: 8, color: C.red, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 4, fontWeight: 700 }}>their reason</div>
          <div style={{ fontSize: 12, color: C.textSec, lineHeight: 1.5 }}>{r.reason}</div>
        </div>
      )}
      {r.counter && (
        <div style={{ background: "rgba(247,185,85,0.05)", border: `1px dashed rgba(247,185,85,0.35)`, borderRadius: 6, padding: "10px 12px" }}>
          <div className="flex items-center" style={{ gap: 6, marginBottom: 4 }}>
            <KlemrSeal size={11} color={C.amber} />
            <span className="k-mono" style={{ fontSize: 8, color: C.amber, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 700 }}>agent's counter</span>
          </div>
          <div style={{ fontSize: 12, color: C.textSec, lineHeight: 1.5 }}>{r.counter}</div>
        </div>
      )}
      {(denied || partial) && !followup && (
        <div className="flex items-center" style={{ gap: 8, marginTop: 4 }}>
          <button
            className="k-btn k-btn-primary"
            style={{ fontSize: 11, padding: "7px 14px" }}

        <div className="k-fade-in" style={{
          background: "rgba(247,185,85,0.06)", border: `1px dashed rgba(247,185,85,0.4)`,

          </span>
          <button onClick={() => setFollowup(null)} className="k-mono" style={{
            background: "transparent", border: "none", color: C.textMuted, cursor: "pointer",

          <button onClick={() => setFollowup(null)} className="k-mono" style={{
            background: "transparent", border: "none", color: C.textMuted, cursor: "pointer",
            fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", padding: "2px 6px",
          }}>undo</button>
        </div>
      )}
    </div>
  );

// SETUP VIEW — onboarding flow
// ─────────────────────────────────────────────────────────────────────────────
function SetupView() {
  const [step, setStep] = useState(0);
  const [carriers, setCarriers] = useState({ ups: true, fedex: true, usps: false, dhl: false });
  const [platform, setPlatform] = useState("shipstation");
  const [scanComplete, setScanComplete] = useState(false);
  const [scanProgress, setScanProgress] = useState(0);

  useEffect(() => {
    if (step !== 4 || scanComplete) return;
    const t = setInterval(() => {
      setScanProgress(p => {
        const np = p + 1.4 + Math.random() * 1.6;
        if (np >= 100) { setScanComplete(true); return 100; }
        return np;
      });
    }, 80);
    return () => clearInterval(t);
  }, [step, scanComplete]);

  const next = () => setStep(s => Math.min(s + 1, 4));
  const prev = () => setStep(s => Math.max(s - 1, 0));
  const reset = () => { setStep(0); setScanComplete(false); setScanProgress(0); };

  const stepDefs = [
    { n: 1, t: "how klemr works", d: "your shipment, end to end" },
    { n: 2, t: "your warehouse", d: "where the packages go out" },
    { n: 3, t: "carriers to watch", d: "we listen for invoices" },
    { n: 4, t: "shipping platform", d: "manifest source" },
    { n: 5, t: "first scan", d: "we go look around" },
  ];

  return (
    <div style={{ padding: "32px 32px 48px", display: "grid", gridTemplateColumns: "260px 1fr", gap: 32, maxWidth: 1100, height: "100%" }}>

      {/* Step list */}
      <aside style={{ display: "flex", flexDirection: "column" }}>
        <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 16 }}>set up · 5 steps</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {stepDefs.map((s, i) => {
            const active = step === i, done = step > i;
            return (
              <div key={i} style={{
                padding: "12px", borderRadius: 8,
                background: active ? "rgba(247,185,85,0.06)" : "transparent",
                border: `1px solid ${active ? "rgba(247,185,85,0.3)" : "transparent"}`,
                display: "flex", gap: 12, cursor: done ? "pointer" : "default",
              }} onClick={() => done && setStep(i)}>
                <div style={{
                  width: 22, height: 22, borderRadius: 999,
                  border: `1px solid ${done || active ? C.amber : C.border}`,
                  background: done ? C.amber : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                }}>
                  {done ? <Icon.Check size={11} color={C.bg} /> : <span className="k-mono" style={{ fontSize: 10, color: active ? C.amber : C.textMuted, fontWeight: 600 }}>{s.n}</span>}
                </div>
                <div>
                  <div style={{ fontSize: 13, color: active || done ? C.text : C.textSec, fontWeight: 500 }}>{s.t}</div>
                  <div className="k-mono" style={{ fontSize: 10, color: C.textMuted, marginTop: 2 }}>{s.d}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ padding: "14px 16px", border: `1px dashed ${C.border}`, borderRadius: 10, background: "rgba(94,234,212,0.03)" }}>
          <div className="k-mono" style={{ fontSize: 9, color: C.mintInk, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 6 }}>why klemr</div>
          <HandNote color={C.mintInk} rotate={-2} size={17} delay={0.1} style={{ display: "block", whiteSpace: "normal", lineHeight: 1.25 }}>

              <div key={i} style={{ width: i === step ? 22 : 8, height: 4, borderRadius: 2, background: i <= step ? C.amber : C.border, transition: "all .3s" }} />

function DossierDetail({ dossier, onClose }) {
  const [cursor, setCursor] = useState(4);
  const [playing, setPlaying] = useState(false);

  useEffect(() => {
    if (!playing) return;
    if (cursor >= TIMELINE_STEPS.length - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setCursor(c => c + 1), 1100);
    return () => clearTimeout(t);
  }, [playing, cursor]);

  const reset = () => { setCursor(0); setPlaying(true); };
  const step = TIMELINE_STEPS[cursor];
  const meta = STATE_META[dossier.state];

  return (
    <>
      <div onClick={onClose} style={{
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)",
        zIndex: 50, animation: "k-fade-in 0.2s ease-out",
      }} />
      <div style={{
        position: "fixed", top: 24, left: 24, right: 24, bottom: 24,
        background: C.bg, border: `1px solid ${C.borderBright}`, borderRadius: 14,
        zIndex: 51, animation: "k-slide-in 0.35s cubic-bezier(.2,.8,.2,1)",
        display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{ padding: "18px 28px", borderBottom: `1px solid ${C.border}`, background: C.bgElevated, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
          <div className="flex items-center" style={{ gap: 14 }}>
            <Icon.Dossier size={16} color={C.amber} />
            <div>
              <div className="k-mono" style={{ fontSize: 9, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase" }}>
                shipment evidence dossier · #{dossier.id} · {dossier.carrier}
              </div>
              <div className="k-mono" style={{ fontSize: 10, color: C.textMuted, marginTop: 4, display: "flex", gap: 14, flexWrap: "wrap" }}>
                <a href="#" onClick={(e) => e.preventDefault()} style={{ color: C.blue, textDecoration: "none", borderBottom: `1px dotted ${C.blue}80` }}>
                  shopify order #{1000 + (parseInt(dossier.id.replace(/\D/g, ""), 10) % 900)} ↗
                </a>
                <a href="#" onClick={(e) => e.preventDefault()} style={{ color: C.blue, textDecoration: "none", borderBottom: `1px dotted ${C.blue}80` }}>
                  {dossier.carrier === "UPS" ? "1Z999AA1" : dossier.carrier === "FedEx" ? "7749 8821 " : "9400 1112 "}
                  {String(parseInt(dossier.id.replace(/\D/g, ""), 10) * 7).slice(-8)} ↗
                </a>
              </div>
              <div className="k-display" style={{ fontSize: 22, color: C.text, lineHeight: 1.05, marginTop: 2 }}>
                the dispute, end-to-end
              </div>
            </div>
            <div style={{ marginLeft: 16, padding: "4px 10px", borderRadius: 4, background: `${meta.color}1A`, border: `1px solid ${meta.color}50` }}>
              <span className="k-mono" style={{ fontSize: 9, color: meta.color, letterSpacing: "0.1em", textTransform: "uppercase", fontWeight: 600 }}>{meta.label}</span>
            </div>
          </div>
          <div className="flex items-center" style={{ gap: 10 }}>
            <button className="k-btn k-btn-ghost" onClick={reset}><Icon.Refresh size={11} color="currentColor" /> replay</button>
            <button className="k-btn k-btn-primary" onClick={() => setPlaying(p => !p)}>
              {playing ? <Icon.Pause size={11} color={C.bg} /> : <Icon.Play size={11} color={C.bg} />} {playing ? "pause" : "play"}
            </button>
            <button onClick={onClose} className="k-btn k-btn-ghost" style={{ padding: "9px" }}>
              <Icon.X size={13} color="currentColor" />
            </button>
          </div>
        </div>

        {/* Body */}
        <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", flex: 1, overflow: "hidden" }}>
          {/* Timeline rail — stages first (the dossier IS the 7 stages),
              with timeline events nested under whichever stage produced them. */}
          <div className="k-scroll" style={{ padding: "26px 36px", overflowY: "auto", borderRight: `1px solid ${C.border}` }}>
            <div className="flex items-center" style={{ marginBottom: 14, gap: 10 }}>
              <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, letterSpacing: "0.18em", textTransform: "uppercase" }}>shipment journey</span>
              <span className="k-mono" style={{ fontSize: 10, color: C.textMuted }}>· t = ship time</span>
            </div>
            {/* Per-stage groups. Each stage shows its events; if a stage has no
                events yet, render a faded "awaiting…" row so the journey is
                visible end-to-end. The active stage = stage of the current step. */}
            {(() => {
              const activeStage = TIMELINE_STEPS[cursor]?.stage;
              const activeIdx = LIFECYCLE.findIndex(s => s.key === activeStage);
              return LIFECYCLE.map((stage, sIdx) => {
                const stageEvents = TIMELINE_STEPS.map((s, i) => ({ ...s, _i: i })).filter(s => s.stage === stage.key);
                const isActive = activeStage === stage.key;
                const isPast = sIdx < activeIdx;
                const isFuture = sIdx > activeIdx;
                const stageColor = stage.color;
                return (
                  <div key={stage.key} style={{
                    position: "relative", paddingLeft: 26, paddingBottom: 18,
                    opacity: isFuture ? 0.4 : 1, transition: "opacity .3s",
                  }}>
                    {/* Stage spine connector */}
                    {sIdx < LIFECYCLE.length - 1 && (
                      <div style={{ position: "absolute", left: 11, top: 22, bottom: -4, width: 1, background: isPast ? stageColor + "55" : C.border }} />
                    )}
                    {/* Stage badge */}
                    <div className={isActive ? "k-pulse" : ""} style={{
                      position: "absolute", left: 0, top: 2,
                      width: 22, height: 22, borderRadius: 999,
                      background: isPast || isActive ? stageColor : "transparent",
                      border: `1.5px solid ${isPast || isActive ? stageColor : C.borderBright}`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      color: isPast || isActive ? C.bg : C.textMuted,
                      fontSize: 10, fontWeight: 700, fontFamily: "var(--font-mono)",
                      boxShadow: isActive ? `0 0 14px ${stageColor}80` : "none",
                      transition: "all .3s",
                    }}>{isPast ? "✓" : stage.id}</div>
                    {/* Stage title row */}
                    <div className="flex items-center" style={{ gap: 8, marginBottom: stageEvents.length ? 10 : 4 }}>
                      <span className="k-mono" style={{
                        fontSize: 10, color: isActive ? stageColor : isPast ? C.textSec : C.textMuted,
                        letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 700,
                      }}>{stage.short}</span>
                      <span style={{ fontSize: 12, color: isActive ? C.text : C.textMuted, fontStyle: "italic" }}>
                        {stage.title.toLowerCase().replace(/^when |^we |^if |^while /, "")}
                      </span>
                    </div>
                    {/* Events nested under this stage */}
                    {stageEvents.length === 0 ? (
                      <div className="k-mono" style={{ fontSize: 10, color: C.textMuted, fontStyle: "italic" }}>
                        {isFuture ? "awaiting…" : "—"}
                      </div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {stageEvents.map((s) => {
                          const tColor = TL_TONE[s.tone];
                          const actor = ACTORS[s.actor];
                          const isCurrent = s._i === cursor;
                          const isStepPast = s._i < cursor;
                          const isStepFuture = s._i > cursor;
                          return (
                            <div key={s._i} onClick={() => { setCursor(s._i); setPlaying(false); }} style={{
                              cursor: "pointer", padding: "6px 10px", borderRadius: 6,
                              background: isCurrent ? `${tColor}14` : "transparent",
                              borderLeft: `2px solid ${isCurrent ? tColor : isStepPast ? tColor + "55" : C.border}`,
                              opacity: isStepFuture ? 0.55 : 1, transition: "all .2s",
                            }}>
                              <div className="flex items-center" style={{ gap: 8, marginBottom: 2, flexWrap: "wrap" }}>
                                <span className="k-mono" style={{ fontSize: 10, color: C.textMuted, fontWeight: 600 }}>{s.t}</span>
                                <span className="k-mono" style={{ fontSize: 9, color: actor.color, letterSpacing: "0.12em", textTransform: "uppercase", background: `${actor.color}15`, padding: "1px 6px", borderRadius: 3 }}>{actor.label}</span>
                              </div>

}

function App() {
  const [view, setView] = useState("overview");
  const [openDossier, setOpenDossier] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const [recovered, setRecovered] = useState(42847.0);
  const [flash, setFlash] = useState(false);
  const [logEntries, setLogEntries] = useState(() => {
    // Seed the agent feed with the 9 spec'd historical entries. Timestamps are
    // back-dated relative to mount time so they render as "3m", "8m", etc.
    // Stage drives the dot color via STAGE_BY_KEY.
    const now = Date.now();
    const m = (mins) => now - mins * 60_000;
    return [
      { id: "seed-1", createdAt: m(3),  stage: "pushback", text: "I'm refiling the fedex dispute on #VB-44156. They denied it citing weather, but the noaa data shows no advisory was issued for that route on that day." },
      { id: "seed-2", createdAt: m(8),  stage: "paid",     text: "Ups returned $487 on #VB-44102 — the eighth late-delivery refund recovered this month.", amount: 487 },
      { id: "seed-3", createdAt: m(17), stage: "filed",    text: "I filed a dispute on #VB-43998 for an oversized-package charge that didn't match the actual dimensions. Ups typically responds in six to fourteen days." },
      { id: "seed-4", createdAt: m(22), stage: "invoice",  text: "I'm seeing a recurring package handling surcharge on shipments leaving dock 3. I've started filing these automatically." },
      { id: "seed-5", createdAt: m(41), stage: "invoice",  text: "I matched the invoice line for #VB-43972 to the original manifest. The charge is correct — nothing to file." },
      { id: "seed-6", createdAt: m(60), stage: "paid",     text: "Ups returned $214 on #VB-43881 for a dimensional weight correction.", amount: 214 },
      { id: "seed-7", createdAt: m(72), stage: "filed",    text: "I filed a late-delivery dispute on #VB-43844, a fedex ground shipment that missed its guaranteed delivery date." },
      { id: "seed-8", createdAt: m(120),stage: "invoice",  text: "I caught a duplicate residential surcharge on #VB-43799 — ups billed it twice on the same invoice." },
      { id: "seed-9", createdAt: m(125),stage: "invoice",  text: "I reconciled this week's ups invoice — fourteen line items, all clean." },
    ];
  });
  const [scanIdx, setScanIdx] = useState(0);
  const [scanProgress, setScanProgress] = useState(34);
  const [activeDossierCount] = useState(1247);
  const [pulse, setPulse] = useState(0);
  const flashTimer = useRef(null);

  // Inject styles once
  useEffect(() => {
    if (document.getElementById("klemr-styles")) return;
    const tag = document.createElement("style");
    tag.id = "klemr-styles";
    tag.textContent = STYLES;
    document.head.appendChild(tag);
  }, []);

  // Activity feed
  useEffect(() => {
    let timer;
    const tick = () => {
      const tpl = ACTIVITY_TEMPLATES[Math.floor(Math.random() * ACTIVITY_TEMPLATES.length)];
      const entry = { ...tpl, id: `live-${Date.now()}-${Math.random()}`, createdAt: Date.now() };
      setLogEntries(prev => [entry, ...prev].slice(0, 12));
      if (entry.amount) {
        setRecovered(r => r + entry.amount);
        setFlash(true);
        clearTimeout(flashTimer.current);
        flashTimer.current = setTimeout(() => setFlash(false), 1500);
      }
      // Realistic cadence: every 25–40s a new piece of activity lands.
      // Carriers don't push invoices every 2 seconds; this is closer to truth.
      timer = setTimeout(tick, 25000 + Math.random() * 15000);
    };
    timer = setTimeout(tick, 12000);
    return () => { clearTimeout(timer); clearTimeout(flashTimer.current); };
  }, [pulse]);

  // Scan progress — visible "the agent is auditing" indicator.
  // Each "scan target" represents a slow-running audit; takes ~30s end-to-end.
  useEffect(() => {
    const t = setInterval(() => {
      setScanProgress(p => {
        const np = p + 0.6 + Math.random() * 1.0;
        if (np >= 100) { setScanIdx(i => (i + 1) % SCAN_TARGETS.length); return 4; }
        return np;
      });
    }, 1400);
    return () => clearInterval(t);
  }, []);

  const spotCheck = useCallback(() => {
    setPulse(n => n + 1);
    setScanProgress(2);
    [0, 600, 1300, 1900].forEach((delay, idx) => {
      setTimeout(() => {
        const pool = idx === 3 ? ACTIVITY_TEMPLATES.filter(t => t.amount) : ACTIVITY_TEMPLATES.filter(t => !t.amount);
        const tpl = pool[Math.floor(Math.random() * pool.length)];
        const entry = { ...tpl, id: `live-${Date.now()}-${Math.random()}`, createdAt: Date.now() };
        setLogEntries(prev => [entry, ...prev].slice(0, 12));
        if (entry.amount) {
          setRecovered(r => r + entry.amount);
          setFlash(true);
          setTimeout(() => setFlash(false), 1500);
        }
      }, delay);
    });
  }, []);

  const closeDossier = useCallback(() => setOpenDossier(null), []);
  const openDossierFn = useCallback((d) => setOpenDossier(d), []);

  const titles = {
    overview: { t: "Overview", s: "every dispute, every dollar, every receipt" },
    dossiers: { t: "Shipment Dossiers", s: "every shipment, watched stage by stage" },
    filings: { t: "Claim Filings", s: "every claim filed for you, on the record" },
    patterns: { t: "Recurring Leaks", s: "money slipping out the same way, every week" },
    setup: { t: "Setup", s: "hand the work over" },
  };

  // Attention signals for the sidebar. We count ONLY what the user needs to
  // act on, not everything that exists.
  const stuckFilings  = FILINGS.filter(f => f.needsHuman).length;
  const leaksToReview = PATTERNS_INIT.filter(p => p.state === "actionable").length;
  const needsAction   = stuckFilings; // overview triage queue mirrors filings flagged needsHuman

  return (
    <div className="k-body" style={{ display: "flex", height: "100vh", background: C.bg, color: C.text }}>
      <Sidebar
        view={view} setView={setView}
        needsAction={needsAction}
        stuckFilings={stuckFilings}
        leaksToReview={leaksToReview}
        collapsed={sidebarCollapsed}
        setCollapsed={setSidebarCollapsed}
      />
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, overflow: "hidden" }}>
        <TopBar title={titles[view].t} subtitle={titles[view].s} recovered={recovered} flash={flash} onSpotCheck={spotCheck} minimal={view === "overview"} />
        <div className="k-scroll" style={{ flex: 1, overflow: "auto", display: "flex", flexDirection: "column", minHeight: 0 }}>
          {view === "overview" && (
            <OverviewView
              recovered={recovered} flash={flash} logEntries={logEntries}
              scanIdx={scanIdx} scanProgress={scanProgress}
              activeDossierCount={activeDossierCount}
              setView={setView} openDossier={openDossierFn}
            />
          )}
          {view === "dossiers" && <DossiersView openDossier={openDossierFn} />}
          {view === "filings" && <FilingsView openDossier={openDossierFn} setView={setView} />}
          {view === "patterns" && <PatternsView />}
          {view === "setup" && <SetupView />}
        </div>
      </div>
      {openDossier && <DossierDetail dossier={openDossier} onClose={closeDossier} />}
    </div>
  );
}
