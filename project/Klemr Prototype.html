<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klemr · Interactive Prototype</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0E0D0B; min-height: 100vh; font-family: 'DM Sans', system-ui, sans-serif; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="tokens.js"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="timeline.jsx"></script>
  <script type="text/babel" src="patterns.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { C } = window.KLEMR;

    function App() {
      React.useEffect(() => { window.injectKlemrStyles(); }, []);

      return (
        <DesignCanvas title="klemr · interactive prototype" subtitle="net-new flows on top of the existing dashboard">
          <DCSection id="onboarding" title="01 · merchant onboarding" subtitle="4-step setup with a 90-day backfill scan that finds money before they finish reading">
            <DCArtboard id="ob-flow" label="onboarding flow · click through 4 steps" width={1100} height={720}>
              <Onboarding />
            </DCArtboard>
          </DCSection>

          <DCSection id="timeline" title="02 · the dispute, end-to-end" subtitle="how a single dossier becomes money — press play or scrub the timeline">
            <DCArtboard id="dispute" label="dispute timeline · scrubbable" width={1100} height={720}>
              <DisputeTimeline />
            </DCArtboard>
          </DCSection>

          <DCSection id="patterns" title="03 · pattern inbox" subtitle="the agent doesn't just see one shipment — it sees the patterns across thousands">
            <DCArtboard id="inbox" label="pattern inbox · file batch disputes" width={1100} height={720}>
              <PatternInbox />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
